name: Build SDL_mixer

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      cache_key_prefix:
        description: Run-scoped prefix used by the aggregate workflow
        required: false
        type: string
        default: ""

permissions:
  contents: read
  actions: write

jobs:
  resolve:
    name: Resolve latest stable releases
    runs-on: ubuntu-24.04
    outputs:
      sdl_ref: ${{ steps.refs.outputs.sdl_ref }}
      component_ref: ${{ steps.refs.outputs.component_ref }}
    steps:
      - name: Resolve official release tags
        id: refs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sdl_ref="$(gh api repos/libsdl-org/SDL/releases/latest --jq '.tag_name')"
          component_ref="$(gh api repos/libsdl-org/SDL_mixer/releases/latest --jq '.tag_name')"
          test -n "$sdl_ref"
          test -n "$component_ref"
          echo "sdl_ref=$sdl_ref" >> "$GITHUB_OUTPUT"
          echo "component_ref=$component_ref" >> "$GITHUB_OUTPUT"
          echo "Using SDL $sdl_ref and SDL_mixer $component_ref"

  build:
    name: SDL_mixer ${{ matrix.rid }}
    needs: resolve
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:

        include:
          - runner: windows-2025
            os: windows
            arch: x64
            rid: win-x64
            msvc_arch: x64
            msvc_host_arch: x64
          - runner: windows-2025
            os: windows
            arch: x86
            rid: win-x86
            msvc_arch: x86
            msvc_host_arch: x64
          - runner: windows-11-arm
            os: windows
            arch: arm64
            rid: win-arm64
            msvc_arch: arm64
            msvc_host_arch: arm64
          - runner: ubuntu-24.04
            os: linux
            arch: x64
            rid: linux-x64
          - runner: ubuntu-24.04
            os: linux
            arch: x86
            rid: linux-x86
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            rid: linux-arm64
          - runner: macos-15-intel
            os: macos
            arch: x64
            rid: osx-x64
            osx_arch: x86_64
          - runner: macos-latest
            os: macos
            arch: arm64
            rid: osx-arm64
            osx_arch: arm64

    env:
      BUILD_DIR: ${{ github.workspace }}/build
      INSTALL_PREFIX: ${{ github.workspace }}/install
      ARTIFACT_DIR: ${{ github.workspace }}/handoff/SDL_mixer/${{ matrix.rid }}

    steps:

      - name: Checkout SDL
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL
          ref: ${{ needs.resolve.outputs.sdl_ref }}
          fetch-depth: 1
          submodules: recursive
          path: SDL

      - name: Checkout SDL_mixer
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL_mixer
          ref: ${{ needs.resolve.outputs.component_ref }}
          fetch-depth: 1
          submodules: recursive
          path: SDL_mixer

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ matrix.rid }}" == "linux-x86" ]]; then
            # Build a real 32-bit desktop library on the x64 runner. X11 is
            # enabled; Wayland is disabled because its full 32-bit protocol/
            # decoration dependency chain is not reliably multiarch-packaged.
            sudo dpkg --add-architecture i386
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              build-essential gcc-multilib g++-multilib libc6-dev-i386 \
              cmake ninja-build pkg-config git file patchelf \
              libasound2-dev:i386 libusb-1.0-0-dev:i386 \
              libdbus-1-dev:i386 libudev-dev:i386 \
              libx11-dev:i386 libxext-dev:i386 libxrandr-dev:i386 \
              libxcursor-dev:i386 libxfixes-dev:i386 libxi-dev:i386 \
              libxss-dev:i386 libxtst-dev:i386 \
              libgl-dev:i386 libvulkan-dev:i386
          else
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              build-essential cmake ninja-build pkg-config git file patchelf \
              libasound2-dev libpulse-dev libjack-dev libsndio-dev \
              libusb-1.0-0-dev libdbus-1-dev libudev-dev \
              libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
              libxi-dev libxss-dev libxtst-dev \
              libwayland-dev wayland-protocols libxkbcommon-dev libdecor-0-dev \
              libdrm-dev libgbm-dev libgl1-mesa-dev libegl1-mesa-dev \
              libpipewire-0.3-dev libvulkan-dev
          fi
      - name: Build and install SDL_mixer stack (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe was not found." }
          $vs = (& $vswhere -latest -products * -property installationPath).Trim()
          if (-not $vs) { throw "No Visual Studio installation was found." }
          $devcmd = Join-Path $vs 'Common7\Tools\VsDevCmd.bat'
          if (-not (Test-Path $devcmd)) { throw "VsDevCmd.bat was not found at $devcmd" }
          
          $environment = & cmd.exe /d /s /c "`"$devcmd`" -no_logo -arch=${{ matrix.msvc_arch }} -host_arch=${{ matrix.msvc_host_arch }} && set"
          if ($LASTEXITCODE -ne 0) { throw "VsDevCmd failed with exit code $LASTEXITCODE." }
          foreach ($line in $environment) {
            if ($line -match '^([^=]+)=(.*)$') {
              [Environment]::SetEnvironmentVariable($matches[1], $matches[2], 'Process')
            }
          }
          
          Get-Command cl.exe -ErrorAction Stop | Out-Host
          Get-Command cmake.exe -ErrorAction Stop | Out-Host
          Get-Command ninja.exe -ErrorAction Stop | Out-Host
          $common = @(
            '-G', 'Ninja',
            '-DCMAKE_BUILD_TYPE=MinSizeRel',
            '-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON',
            '-DCMAKE_C_FLAGS_MINSIZEREL=/Os /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_CXX_FLAGS_MINSIZEREL=/Os /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF',
            '-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF'
          )
          $sdlOptions = @(
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            '-DSDL_INSTALL=ON',
            '-DSDL_SHARED=ON',
            '-DSDL_STATIC=OFF',
            '-DSDL_TESTS=OFF',
            '-DSDL_EXAMPLES=OFF',
            '-DSDL_INSTALL_DOCS=OFF',
            '-DSDL_INSTALL_TESTS=OFF'
          )
          & cmake -S SDL -B "$env:BUILD_DIR/SDL" @common @sdlOptions
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --build "$env:BUILD_DIR/SDL" --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --install "$env:BUILD_DIR/SDL"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $componentOptions = @(
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            "-DCMAKE_PREFIX_PATH=$env:INSTALL_PREFIX",
            '-DBUILD_SHARED_LIBS=ON',
            '-DSDLMIXER_INSTALL=ON',
            '-DSDLMIXER_INSTALL_MAN=OFF',
            '-DSDLMIXER_INSTALL_CPACK=OFF',
            '-DSDLMIXER_VENDORED=ON',
            '-DSDLMIXER_DEPS_SHARED=OFF',
            '-DSDLMIXER_TESTS=OFF',
            '-DSDLMIXER_EXAMPLES=OFF',
            '-DSDLMIXER_AIFF=OFF',
            '-DSDLMIXER_WAVE=ON',
            '-DSDLMIXER_VOC=OFF',
            '-DSDLMIXER_AU=OFF',
            '-DSDLMIXER_FLAC=ON',
            '-DSDLMIXER_FLAC_LIBFLAC=OFF',
            '-DSDLMIXER_FLAC_DRFLAC=ON',
            '-DSDLMIXER_GME=OFF',
            '-DSDLMIXER_MOD=OFF',
            '-DSDLMIXER_MP3=ON',
            '-DSDLMIXER_MP3_DRMP3=ON',
            '-DSDLMIXER_MP3_MPG123=OFF',
            '-DSDLMIXER_MIDI=OFF',
            '-DSDLMIXER_OPUS=OFF',
            '-DSDLMIXER_VORBIS_STB=ON',
            '-DSDLMIXER_VORBIS_VORBISFILE=OFF',
            '-DSDLMIXER_VORBIS_TREMOR=OFF',
            '-DSDLMIXER_WAVPACK=OFF'
          )
          & cmake -S SDL_mixer -B "$env:BUILD_DIR/SDL_mixer" @common @componentOptions
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --build "$env:BUILD_DIR/SDL_mixer" --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --install "$env:BUILD_DIR/SDL_mixer"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build and install SDL_mixer stack (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          common=(
            -G Ninja
            -DCMAKE_BUILD_TYPE=MinSizeRel
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
          )
          
          cflags="-Os -flto -ffunction-sections -fdata-sections -DNDEBUG"
          cxxflags="$cflags"
          if [[ "${{ matrix.os }}" == "macos" ]]; then
            ldflags="-flto -Wl,-dead_strip -Wl,-x"
            common+=("-DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}" -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0)
          else
            ldflags="-flto -Wl,--gc-sections -Wl,--as-needed -s"
          fi

          if [[ "${{ matrix.rid }}" == "linux-x86" ]]; then
            # Force every configure/build in this stack to emit i386 code and
            # make pkg-config resolve the 32-bit X11/OpenGL/Vulkan libraries.
            export PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig:/usr/share/pkgconfig
            export PKG_CONFIG_PATH=
            common+=(
              -DCMAKE_SYSTEM_PROCESSOR=x86
              -DCMAKE_C_FLAGS=-m32
              -DCMAKE_CXX_FLAGS=-m32
              -DCMAKE_SHARED_LINKER_FLAGS=-m32
              -DCMAKE_EXE_LINKER_FLAGS=-m32
            )
          fi
          
          common+=(
            "-DCMAKE_C_FLAGS_MINSIZEREL=$cflags"
            "-DCMAKE_CXX_FLAGS_MINSIZEREL=$cxxflags"
            "-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=$ldflags"
            "-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=$ldflags"
          )
          sdl_options=(
            "-DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX"
            -DSDL_INSTALL=ON
            -DSDL_SHARED=ON
            -DSDL_STATIC=OFF
            -DSDL_TESTS=OFF
            -DSDL_EXAMPLES=OFF
            -DSDL_INSTALL_DOCS=OFF
            -DSDL_INSTALL_TESTS=OFF
          )

          if [[ "${{ matrix.rid }}" == "linux-x86" ]]; then
            sdl_options+=(
              -DSDL_X11=ON
              -DSDL_WAYLAND=OFF
              -DSDL_KMSDRM=OFF
              -DSDL_LIBDECOR=OFF
              -DSDL_OPENGL=ON
              -DSDL_OPENGLES=OFF
              -DSDL_VULKAN=ON
              -DSDL_ALSA=ON
              -DSDL_PULSEAUDIO=OFF
              -DSDL_JACK=OFF
              -DSDL_SNDIO=OFF
              -DSDL_PIPEWIRE=OFF
            )
          fi
          
          cmake -S SDL -B "$BUILD_DIR/SDL" "${common[@]}" "${sdl_options[@]}"
          cmake --build "$BUILD_DIR/SDL" --parallel
          cmake --install "$BUILD_DIR/SDL" --strip

          component_options=(
            "-DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX"
            "-DCMAKE_PREFIX_PATH=$INSTALL_PREFIX"
            -DBUILD_SHARED_LIBS=ON
            -DSDLMIXER_INSTALL=ON
            -DSDLMIXER_INSTALL_MAN=OFF
            -DSDLMIXER_INSTALL_CPACK=OFF
            -DSDLMIXER_VENDORED=ON
            -DSDLMIXER_DEPS_SHARED=OFF
            -DSDLMIXER_TESTS=OFF
            -DSDLMIXER_EXAMPLES=OFF
            -DSDLMIXER_AIFF=OFF
            -DSDLMIXER_WAVE=ON
            -DSDLMIXER_VOC=OFF
            -DSDLMIXER_AU=OFF
            -DSDLMIXER_FLAC=ON
            -DSDLMIXER_FLAC_LIBFLAC=OFF
            -DSDLMIXER_FLAC_DRFLAC=ON
            -DSDLMIXER_GME=OFF
            -DSDLMIXER_MOD=OFF
            -DSDLMIXER_MP3=ON
            -DSDLMIXER_MP3_DRMP3=ON
            -DSDLMIXER_MP3_MPG123=OFF
            -DSDLMIXER_MIDI=OFF
            -DSDLMIXER_OPUS=OFF
            -DSDLMIXER_VORBIS_STB=ON
            -DSDLMIXER_VORBIS_VORBISFILE=OFF
            -DSDLMIXER_VORBIS_TREMOR=OFF
            -DSDLMIXER_WAVPACK=OFF
          )
          cmake -S SDL_mixer -B "$BUILD_DIR/SDL_mixer" "${common[@]}" "${component_options[@]}"
          cmake --build "$BUILD_DIR/SDL_mixer" --parallel
          cmake --install "$BUILD_DIR/SDL_mixer" --strip


          if [[ "${{ matrix.rid }}" == "linux-x86" ]]; then
            mapfile -d '' shared_objects < <(find "$INSTALL_PREFIX" -type f -name '*.so*' -print0)
            (( ${#shared_objects[@]} > 0 ))
            for shared_object in "${shared_objects[@]}"; do
              description="$(file -Lb "$shared_object")"
              echo "$shared_object: $description"
              [[ "$description" == *"ELF 32-bit"* ]]
            done
          fi


      - name: Stage minimal runtime binary (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Remove-Item $env:ARTIFACT_DIR -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $env:ARTIFACT_DIR | Out-Null

          $binary = Get-ChildItem -Path $env:INSTALL_PREFIX -Recurse -File -Filter 'SDL3_mixer.dll' |
            Select-Object -First 1
          if (-not $binary) { throw 'Could not find SDL3_mixer.dll under the install prefix.' }
          Copy-Item $binary.FullName (Join-Path $env:ARTIFACT_DIR 'SDL3_mixer.dll') -Force

      - name: Stage minimal runtime binary (Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"

          canonical="libSDL3_mixer.so"
          source="$(find "$INSTALL_PREFIX" -type f -name "libSDL3_mixer.so*" -printf '%s %p\n' \
            | sort -nr | head -n 1 | cut -d' ' -f2-)"
          if [[ -z "$source" ]]; then
            echo "Could not find a real libSDL3_mixer.so binary under $INSTALL_PREFIX." >&2
            exit 1
          fi

          target="$ARTIFACT_DIR/$canonical"
          cp "$source" "$target"
          chmod 755 "$target"
          patchelf --set-soname "$canonical" "$target"
          patchelf --set-rpath '$ORIGIN' "$target"

          while IFS= read -r dependency; do
            case "$dependency" in
              libSDL3.so.*)
                patchelf --replace-needed "$dependency" libSDL3.so "$target"
                ;;
            esac
          done < <(patchelf --print-needed "$target")

          [[ "$(patchelf --print-soname "$target")" == "$canonical" ]]
          find "$ARTIFACT_DIR" -maxdepth 1 -type f -printf '%f %s bytes\n'

      - name: Stage minimal runtime binary (macOS)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"

          canonical="libSDL3_mixer.dylib"
          source="$(find "$INSTALL_PREFIX" -type f -name "libSDL3_mixer*.dylib" -print \
            | while IFS= read -r path; do stat -f '%z %N' "$path"; done \
            | sort -nr | head -n 1 | cut -d' ' -f2-)"
          if [[ -z "$source" ]]; then
            echo "Could not find a real libSDL3_mixer.dylib binary under $INSTALL_PREFIX." >&2
            exit 1
          fi

          target="$ARTIFACT_DIR/$canonical"
          cp "$source" "$target"
          chmod 755 "$target"
          install_name_tool -id "@rpath/$canonical" "$target"

          while IFS= read -r dependency; do
            dependency_basename="$(basename "$dependency")"
            case "$dependency_basename" in
              libSDL3.dylib|libSDL3.*.dylib)
                install_name_tool -change "$dependency" @loader_path/libSDL3.dylib "$target"
                ;;
            esac
          done < <(otool -L "$target" | tail -n +2 | awk '{print $1}')

          echo "Staged $target ($(stat -f '%z' "$target") bytes)"

      - name: Save SDL_mixer ${{ matrix.rid }} for collection
        uses: actions/cache/save@v4
        with:
          path: handoff
          key: ${{ inputs.cache_key_prefix != '' && inputs.cache_key_prefix || format('sdl-native-{0}-{1}', github.run_id, github.run_attempt) }}-SDL_mixer-${{ matrix.rid }}
          enableCrossOsArchive: true

  collect:
    name: Collect SDL_mixer runtime binaries
    runs-on: ubuntu-24.04
    needs: build
    env:
      HANDOFF_PREFIX: ${{ inputs.cache_key_prefix != '' && inputs.cache_key_prefix || format('sdl-native-{0}-{1}', github.run_id, github.run_attempt) }}

    steps:
      - name: Restore SDL_mixer win-x64
        uses: actions/cache/restore@v4
        with:
          path: handoff
          key: ${{ env.HANDOFF_PREFIX }}-SDL_mixer-win-x64
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Restore SDL_mixer win-x86
        uses: actions/cache/restore@v4
        with:
          path: handoff
          key: ${{ env.HANDOFF_PREFIX }}-SDL_mixer-win-x86
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Restore SDL_mixer win-arm64
        uses: actions/cache/restore@v4
        with:
          path: handoff
          key: ${{ env.HANDOFF_PREFIX }}-SDL_mixer-win-arm64
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Restore SDL_mixer linux-x64
        uses: actions/cache/restore@v4
        with:
          path: handoff
          key: ${{ env.HANDOFF_PREFIX }}-SDL_mixer-linux-x64
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Restore SDL_mixer linux-x86
        uses: actions/cache/restore@v4
        with:
          path: handoff
          key: ${{ env.HANDOFF_PREFIX }}-SDL_mixer-linux-x86
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Restore SDL_mixer linux-arm64
        uses: actions/cache/restore@v4
        with:
          path: handoff
          key: ${{ env.HANDOFF_PREFIX }}-SDL_mixer-linux-arm64
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Restore SDL_mixer osx-x64
        uses: actions/cache/restore@v4
        with:
          path: handoff
          key: ${{ env.HANDOFF_PREFIX }}-SDL_mixer-osx-x64
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Restore SDL_mixer osx-arm64
        uses: actions/cache/restore@v4
        with:
          path: handoff
          key: ${{ env.HANDOFF_PREFIX }}-SDL_mixer-osx-arm64
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Validate collected SDL_mixer files
        shell: bash
        run: |
          set -euo pipefail
          root="handoff/SDL_mixer"
          rids=(win-x64 win-x86 win-arm64 linux-x64 linux-x86 linux-arm64 osx-x64 osx-arm64)
          for rid in "${rids[@]}"; do
            directory="$root/$rid"
            [[ -d "$directory" ]] || { echo "Missing $directory" >&2; exit 1; }
            count="$(find "$directory" -maxdepth 1 -type f | wc -l)"
            if [[ "SDL_mixer" == "SDL_shadercross" && ( "$rid" == "win-x64" || "$rid" == "win-arm64" ) ]]; then
              [[ "$count" -eq 3 ]] || { find "$directory" -maxdepth 1 -type f -print; exit 1; }
            else
              [[ "$count" -eq 1 ]] || { find "$directory" -maxdepth 1 -type f -print; exit 1; }
            fi
          done
          find "$root" -type f -print | sort

      - name: Save collected SDL_mixer for aggregate workflow
        if: inputs.cache_key_prefix != ''
        uses: actions/cache/save@v4
        with:
          path: handoff/SDL_mixer
          key: ${{ env.HANDOFF_PREFIX }}-SDL_mixer
          enableCrossOsArchive: true

      - name: Upload standalone SDL_mixer binaries
        if: inputs.cache_key_prefix == ''
        uses: actions/upload-artifact@v4
        with:
          name: SDL3-CS.Native.Mixer-binaries
          path: handoff/SDL_mixer/
          if-no-files-found: error
          compression-level: 9

  cleanup:
    name: Delete standalone handoff caches
    if: always() && inputs.cache_key_prefix == ''
    runs-on: ubuntu-24.04
    needs: [build, collect]
    env:
      HANDOFF_PREFIX: ${{ inputs.cache_key_prefix != '' && inputs.cache_key_prefix || format('sdl-native-{0}-{1}', github.run_id, github.run_attempt) }}

    steps:
      - name: Delete temporary RID caches
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          for rid in win-x64 win-x86 win-arm64 linux-x64 linux-x86 linux-arm64 osx-x64 osx-arm64; do
            gh cache delete "$HANDOFF_PREFIX-SDL_mixer-$rid" --ref "$GITHUB_REF"
          done
