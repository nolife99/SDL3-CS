name: Build SDL_ttf

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve official stable releases
    runs-on: ubuntu-24.04
    outputs:
      sdl_tag: ${{ steps.releases.outputs.sdl_tag }}
      addon_tag: ${{ steps.releases.outputs.addon_tag }}

    steps:
      - name: Resolve latest non-prerelease tags
        id: releases
        uses: actions/github-script@v7
        with:
          script: |
            async function resolveStable(owner, repo, outputName) {
              const { data } = await github.rest.repos.getLatestRelease({ owner, repo });
              if (data.draft || data.prerelease) {
                core.setFailed(`${owner}/${repo} returned a non-stable release: ${data.tag_name}`);
                return;
              }
              core.setOutput(outputName, data.tag_name);
              core.info(`${owner}/${repo} -> ${data.tag_name}`);
              core.summary.addRaw(`- ${owner}/${repo}: ${data.tag_name}\n`);
            }

            await resolveStable('libsdl-org', 'SDL', 'sdl_tag');
            await resolveStable('libsdl-org', 'SDL_ttf', 'addon_tag');
            await core.summary.write();

  build:
    needs: resolve
    name: SDL_ttf ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            platform: windows
            arch: x64
            rid: win-x64
          - runner: windows-2025
            platform: windows
            arch: x86
            rid: win-x86
          - runner: windows-11-arm
            platform: windows
            arch: arm64
            rid: win-arm64
          - runner: macos-15-intel
            platform: macos
            arch: x64
            rid: osx-x64
            osx_arch: x86_64
          - runner: macos-latest
            platform: macos
            arch: arm64
            rid: osx-arm64
            osx_arch: arm64
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
            rid: linux-x64
          - runner: ubuntu-24.04
            platform: linux
            arch: x86
            rid: linux-x86
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            rid: linux-arm64

    env:
      BUILD_DIR: ${{ github.workspace }}/build
      INSTALL_PREFIX: ${{ github.workspace }}/install
      CMAKE_BUILD_TYPE: MinSizeRel

    steps:
      - name: Fetch official SDL ${{ needs.resolve.outputs.sdl_tag }}
        shell: bash
        env:
          SDL_TAG: ${{ needs.resolve.outputs.sdl_tag }}
        run: |
          set -euxo pipefail
          rm -rf SDL
          git clone --filter=blob:none --depth 1 --branch "$SDL_TAG" \
            https://github.com/libsdl-org/SDL.git SDL
          test "$(git -C SDL remote get-url origin)" = \
            "https://github.com/libsdl-org/SDL.git"
          test "$(git -C SDL describe --tags --exact-match HEAD)" = "$SDL_TAG"
          echo "- SDL source: libsdl-org/SDL@$SDL_TAG" >> "$GITHUB_STEP_SUMMARY"

      - name: Fetch official SDL_ttf ${{ needs.resolve.outputs.addon_tag }}
        shell: bash
        env:
          ADDON_TAG: ${{ needs.resolve.outputs.addon_tag }}
        run: |
          set -euxo pipefail
          rm -rf SDL_ttf
          git clone --filter=blob:none --depth 1 --branch "$ADDON_TAG" \
            https://github.com/libsdl-org/SDL_ttf.git SDL_ttf
          test "$(git -C SDL_ttf remote get-url origin)" = \
            "https://github.com/libsdl-org/SDL_ttf.git"
          test "$(git -C SDL_ttf describe --tags --exact-match HEAD)" = "$ADDON_TAG"
          echo "- SDL_ttf source: libsdl-org/SDL_ttf@$ADDON_TAG" >> "$GITHUB_STEP_SUMMARY"

      - name: Initialize required SDL_ttf dependencies
        shell: bash
        run: |
          set -euo pipefail
          git -C SDL_ttf submodule update --init --depth 1 \
            external/freetype external/harfbuzz

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux' && matrix.arch != 'x86'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld ninja-build pkg-config \
            libasound2-dev libpulse-dev libpipewire-0.3-dev \
            libusb-1.0-0-dev libdbus-1-dev libudev-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxrender-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libdecor-0-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libvulkan-dev

      - name: Install Linux x86 cross-build dependencies
        if: matrix.platform == 'linux' && matrix.arch == 'x86'
        shell: bash
        run: |
          set -euxo pipefail
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld ninja-build pkg-config gcc-multilib g++-multilib \
            libasound2-dev:i386 libpulse-dev:i386 \
            libusb-1.0-0-dev:i386 libdbus-1-dev:i386 libudev-dev:i386 \
            libx11-dev:i386 libxext-dev:i386 libxrandr-dev:i386 libxcursor-dev:i386 \
            libxfixes-dev:i386 libxi-dev:i386 libxss-dev:i386 libxtst-dev:i386 \
            libxrender-dev:i386 libwayland-dev:i386 wayland-protocols \
            libxkbcommon-dev:i386 libdrm-dev:i386 \
            libgbm-dev:i386 libgl1-mesa-dev:i386 libegl1-mesa-dev:i386 \
            libgles2-mesa-dev:i386

      - name: Initialize latest MSVC toolchain for Ninja
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $originalPath = $env:PATH

          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe was not found at $vswhere"
          }

          $instances = @(& $vswhere -all -products * -format json | ConvertFrom-Json)
          $instance = $instances |
            Sort-Object { [version]$_.installationVersion } -Descending |
            Where-Object {
              Test-Path (Join-Path $_.installationPath 'Common7\Tools\VsDevCmd.bat')
            } |
            Select-Object -First 1

          if (-not $instance) {
            throw 'No Visual Studio installation containing VsDevCmd.bat was found.'
          }

          $hostArch = if ($env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'arm64' } else { 'x64' }
          $targetArch = '${{ matrix.arch }}'
          $vsDevCmd = Join-Path $instance.installationPath 'Common7\Tools\VsDevCmd.bat'
          $command = "call `"$vsDevCmd`" -no_logo -host_arch=$hostArch -arch=$targetArch && set"
          $environment = & $env:ComSpec /d /s /c $command
          if ($LASTEXITCODE -ne 0) {
            throw "VsDevCmd failed with exit code $LASTEXITCODE."
          }

          foreach ($line in $environment) {
            if ($line -notmatch '^([^=]+)=(.*)$') { continue }
            $name = $Matches[1]
            $value = $Matches[2]

            if ($name -ieq 'PATH') {
              $value = "$value;$originalPath"
            }

            if ($name -notmatch '^(?i:PATH|INCLUDE|LIB|LIBPATH|VC.*|VS.*|VisualStudio.*|Windows.*|UniversalCRT.*|UCRT.*|Framework.*|NETFX.*|ExtensionSdk.*|DevEnvDir)$') {
              continue
            }

            $delimiter = "__MSVC_ENV_$([guid]::NewGuid().ToString('N'))"
            "$name<<$delimiter`n$value`n$delimiter" |
              Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

            if ($name -ieq 'PATH') {
              $env:PATH = $value
            } else {
              Set-Item -Path "Env:$name" -Value $value
            }
          }

          # Ninja uses the compiler environment above and does not need CMake
          # to discover a Visual Studio installation or versioned generator.
          'CMAKE_GENERATOR=Ninja' |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $env:CMAKE_GENERATOR = 'Ninja'

          if (-not (Get-Command cl.exe -ErrorAction SilentlyContinue)) {
            throw "cl.exe was not found after initializing $vsDevCmd"
          }
          if (-not (Get-Command ninja.exe -ErrorAction SilentlyContinue)) {
            throw 'ninja.exe was not found on the runner PATH.'
          }

          Write-Host "Visual Studio $($instance.installationVersion) at $($instance.installationPath)"
          Write-Host "MSVC host=$hostArch target=$targetArch"
          Write-Host "cl.exe: $((Get-Command cl.exe).Source)"
          Write-Host "ninja.exe: $((Get-Command ninja.exe).Source)"
          & ninja.exe --version | Write-Host

      - name: Configure SDL (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $args = @(
            '-S', 'SDL',
            '-B', "$env:BUILD_DIR/SDL",
            '-G', 'Ninja',
            '-DCMAKE_C_COMPILER=cl.exe',
            '-DCMAKE_CXX_COMPILER=cl.exe',
            "-DCMAKE_BUILD_TYPE=$env:CMAKE_BUILD_TYPE",
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            '-DCMAKE_INSTALL_LIBDIR=lib',
            '-DCMAKE_INSTALL_BINDIR=bin',
            '-DCMAKE_INTERPROCEDURAL_OPTIMIZATION_MINSIZEREL=ON',
            '-DCMAKE_C_FLAGS_MINSIZEREL=/O1 /Ob1 /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_CXX_FLAGS_MINSIZEREL=/O1 /Ob1 /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF /INCREMENTAL:NO',
            '-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF /INCREMENTAL:NO',
            '-DSDL_SHARED=ON',
            '-DSDL_STATIC=OFF',
            '-DSDL_INSTALL=ON',
            '-DSDL_INSTALL_DOCS=OFF',
            '-DSDL_TEST_LIBRARY=OFF',
            '-DSDL_TESTS=OFF',
            '-DSDL_EXAMPLES=OFF'
          )
          & cmake @args
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Configure SDL (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euxo pipefail
          cflags='-Oz -ffunction-sections -fdata-sections -fno-ident -flto'
          ldflags='-flto'
          extra=()

          if [[ '${{ matrix.platform }}' == 'linux' ]]; then
            export CC=clang CXX=clang++
            ldflags+=' -fuse-ld=lld -Wl,-O2 -Wl,--gc-sections -Wl,--icf=all -Wl,--as-needed -Wl,--strip-all'
          else
            ldflags+=' -Wl,-dead_strip -Wl,-x'
            extra+=(
              '-DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}'
              '-DCMAKE_OSX_DEPLOYMENT_TARGET=12.0'
            )
          fi

          if [[ '${{ matrix.arch }}' == 'x86' ]]; then
            cflags+=' -m32'
            ldflags+=' -m32'
            export PKG_CONFIG_PATH=
            export PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig:/usr/share/pkgconfig
            extra+=(
              '-DSDL_PIPEWIRE=OFF'
              '-DSDL_WAYLAND_LIBDECOR=OFF'
              '-DSDL_VULKAN=OFF'
              '-DSDL_RENDER_VULKAN=OFF'
            )
          fi

          cmake -S SDL -B "$BUILD_DIR/SDL" -G Ninja \
            -DCMAKE_BUILD_TYPE="$CMAKE_BUILD_TYPE" \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX" \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DCMAKE_INSTALL_BINDIR=bin \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION_MINSIZEREL=ON \
            "-DCMAKE_C_FLAGS_MINSIZEREL=$cflags" \
            "-DCMAKE_CXX_FLAGS_MINSIZEREL=$cflags" \
            "-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=$ldflags" \
            "-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=$ldflags" \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            -DSDL_INSTALL=ON \
            -DSDL_INSTALL_DOCS=OFF \
            -DSDL_TEST_LIBRARY=OFF \
            -DSDL_TESTS=OFF \
            -DSDL_EXAMPLES=OFF \
            "${extra[@]}"

      - name: Build SDL (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake --build "$env:BUILD_DIR/SDL" --config $env:CMAKE_BUILD_TYPE --parallel

      - name: Build SDL (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: cmake --build "$BUILD_DIR/SDL" --config "$CMAKE_BUILD_TYPE" --parallel

      - name: Install SDL (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake --install "$env:BUILD_DIR/SDL" --config $env:CMAKE_BUILD_TYPE

      - name: Install SDL (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: cmake --install "$BUILD_DIR/SDL" --config "$CMAKE_BUILD_TYPE" --strip

      # Keep HarfBuzz shaping; omit the comparatively large SVG/color-emoji backend.
      - name: Configure SDL_ttf (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $args = @(
            '-S', 'SDL_ttf',
            '-B', "$env:BUILD_DIR/SDL_ttf",
            '-G', 'Ninja',
            '-DCMAKE_C_COMPILER=cl.exe',
            '-DCMAKE_CXX_COMPILER=cl.exe',
            "-DCMAKE_BUILD_TYPE=$env:CMAKE_BUILD_TYPE",
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            "-DCMAKE_PREFIX_PATH=$env:INSTALL_PREFIX",
            '-DCMAKE_INSTALL_LIBDIR=lib',
            '-DCMAKE_INSTALL_BINDIR=bin',
            '-DCMAKE_INTERPROCEDURAL_OPTIMIZATION_MINSIZEREL=ON',
            '-DCMAKE_C_FLAGS_MINSIZEREL=/O1 /Ob1 /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_CXX_FLAGS_MINSIZEREL=/O1 /Ob1 /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF /INCREMENTAL:NO',
            '-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF /INCREMENTAL:NO',
            '-DBUILD_SHARED_LIBS=ON',
            '-DSDLTTF_INSTALL=ON',
            '-DSDLTTF_INSTALL_MAN=OFF',
            '-DSDLTTF_SAMPLES=OFF',
            '-DSDLTTF_VENDORED=ON',
            '-DSDLTTF_STRICT=ON',
            '-DSDLTTF_HARFBUZZ=ON',
            '-DSDLTTF_PLUTOSVG=OFF',
            '-DHB_BUILD_SUBSET=OFF',
            '-DHB_BUILD_UTILS=OFF',
            '-DHB_BUILD_TESTS=OFF',
            '-DHB_BUILD_BENCHMARKS=OFF',
            '-DHB_BUILD_FUZZING=OFF',
            '-DFT_DISABLE_ZLIB=ON',
            '-DFT_DISABLE_BZIP2=ON',
            '-DFT_DISABLE_PNG=ON',
            '-DFT_DISABLE_BROTLI=ON'
          )
          & cmake @args
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Configure SDL_ttf (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euxo pipefail
          cflags='-Oz -ffunction-sections -fdata-sections -fno-ident -flto'
          ldflags='-flto'
          extra=()

          if [[ '${{ matrix.platform }}' == 'linux' ]]; then
            export CC=clang CXX=clang++
            ldflags+=' -fuse-ld=lld -Wl,-O2 -Wl,--gc-sections -Wl,--icf=all -Wl,--as-needed -Wl,--strip-all'
          else
            ldflags+=' -Wl,-dead_strip -Wl,-x'
            extra+=(
              '-DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}'
              '-DCMAKE_OSX_DEPLOYMENT_TARGET=12.0'
            )
            export PKG_CONFIG= PKG_CONFIG_PATH= PKG_CONFIG_LIBDIR=
          fi

          if [[ '${{ matrix.arch }}' == 'x86' ]]; then
            cflags+=' -m32'
            ldflags+=' -m32'
            export PKG_CONFIG_PATH=
            export PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig:/usr/share/pkgconfig
          fi

          cmake -S SDL_ttf -B "$BUILD_DIR/SDL_ttf" -G Ninja \
            -DCMAKE_BUILD_TYPE="$CMAKE_BUILD_TYPE" \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX" \
            -DCMAKE_PREFIX_PATH="$INSTALL_PREFIX" \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DCMAKE_INSTALL_BINDIR=bin \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION_MINSIZEREL=ON \
            "-DCMAKE_C_FLAGS_MINSIZEREL=$cflags" \
            "-DCMAKE_CXX_FLAGS_MINSIZEREL=$cflags" \
            "-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=$ldflags" \
            "-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=$ldflags" \
            -DBUILD_SHARED_LIBS=ON \
            -DSDLTTF_INSTALL=ON \
            -DSDLTTF_INSTALL_MAN=OFF \
            -DSDLTTF_SAMPLES=OFF \
            -DSDLTTF_VENDORED=ON \
            -DSDLTTF_STRICT=ON \
            -DSDLTTF_HARFBUZZ=ON \
            -DSDLTTF_PLUTOSVG=OFF \
            -DHB_BUILD_SUBSET=OFF \
            -DHB_BUILD_UTILS=OFF \
            -DHB_BUILD_TESTS=OFF \
            -DHB_BUILD_BENCHMARKS=OFF \
            -DHB_BUILD_FUZZING=OFF \
            -DFT_DISABLE_ZLIB=ON \
            -DFT_DISABLE_BZIP2=ON \
            -DFT_DISABLE_PNG=ON \
            -DFT_DISABLE_BROTLI=ON \
            "${extra[@]}"

      - name: Build SDL_ttf (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake --build "$env:BUILD_DIR/SDL_ttf" --config $env:CMAKE_BUILD_TYPE --parallel

      - name: Build SDL_ttf (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: cmake --build "$BUILD_DIR/SDL_ttf" --config "$CMAKE_BUILD_TYPE" --parallel

      - name: Install SDL_ttf (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake --install "$env:BUILD_DIR/SDL_ttf" --config $env:CMAKE_BUILD_TYPE

      - name: Install SDL_ttf (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: cmake --install "$BUILD_DIR/SDL_ttf" --config "$CMAKE_BUILD_TYPE" --strip

      - name: Remove non-runtime Windows build files
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem $env:INSTALL_PREFIX -Recurse -File -Include *.pdb,*.exp,*.ilk |
            Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Verify installed binaries (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem $env:INSTALL_PREFIX -Recurse -File
          $files | ForEach-Object { $_.FullName }
          if (-not ($files | Where-Object Name -eq 'SDL3_ttf.dll')) {
            throw 'SDL3_ttf.dll was not installed.'
          }

      - name: Verify installed binaries (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euxo pipefail
          find "$INSTALL_PREFIX" -maxdepth 4 -type f -print
          test -n "$(find "$INSTALL_PREFIX" -type f \( -name 'libSDL3_ttf.so*' -o -name 'libSDL3_ttf*.dylib' \) -print -quit)"

      - name: Upload SDL_ttf ${{ matrix.rid }}
        uses: actions/upload-artifact@v4
        with:
          name: SDL_ttf-${{ matrix.rid }}
          path: ${{ env.INSTALL_PREFIX }}/
          if-no-files-found: error
          compression-level: 9

  pack:
    name: Pack SDL_ttf runtime libraries
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download per-platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create RID layout
        shell: bash
        run: |
          set -euxo pipefail
          for rid in win-x64 win-x86 win-arm64 linux-x64 linux-x86 linux-arm64 osx-x64 osx-arm64; do
            mkdir -p "lib/$rid"
          done

          find artifacts/SDL_ttf-win-x64/bin -maxdepth 1 -type f -name '*.dll' -exec cp {} lib/win-x64/ \;
          find artifacts/SDL_ttf-win-x86/bin -maxdepth 1 -type f -name '*.dll' -exec cp {} lib/win-x86/ \;
          find artifacts/SDL_ttf-win-arm64/bin -maxdepth 1 -type f -name '*.dll' -exec cp {} lib/win-arm64/ \;

          find artifacts/SDL_ttf-linux-x64/lib -maxdepth 1 -type f -name '*.so*' -exec cp {} lib/linux-x64/ \;
          find artifacts/SDL_ttf-linux-x86/lib -maxdepth 1 -type f -name '*.so*' -exec cp {} lib/linux-x86/ \;
          find artifacts/SDL_ttf-linux-arm64/lib -maxdepth 1 -type f -name '*.so*' -exec cp {} lib/linux-arm64/ \;

          find artifacts/SDL_ttf-osx-x64/lib -maxdepth 1 -type f -name '*.dylib' -exec cp {} lib/osx-x64/ \;
          find artifacts/SDL_ttf-osx-arm64/lib -maxdepth 1 -type f -name '*.dylib' -exec cp {} lib/osx-arm64/ \;

          find lib -type f -print
          zip -9 -r SDL_ttf-libs.zip lib

      - name: Upload combined runtime archive
        uses: actions/upload-artifact@v4
        with:
          name: SDL_ttf-libs
          path: SDL_ttf-libs.zip
          if-no-files-found: error
          compression-level: 0
