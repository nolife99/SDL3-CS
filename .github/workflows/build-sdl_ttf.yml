name: Build SDL_ttf

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve latest stable releases
    runs-on: ubuntu-24.04
    outputs:
      sdl_ref: ${{ steps.refs.outputs.sdl_ref }}
      component_ref: ${{ steps.refs.outputs.component_ref }}
    steps:
      - name: Resolve official release tags
        id: refs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sdl_ref="$(gh api repos/libsdl-org/SDL/releases/latest --jq '.tag_name')"
          component_ref="$(gh api repos/libsdl-org/SDL_ttf/releases/latest --jq '.tag_name')"
          test -n "$sdl_ref"
          test -n "$component_ref"
          echo "sdl_ref=$sdl_ref" >> "$GITHUB_OUTPUT"
          echo "component_ref=$component_ref" >> "$GITHUB_OUTPUT"
          echo "Using SDL $sdl_ref and SDL_ttf $component_ref"

  build:
    name: SDL_ttf ${{ matrix.rid }}
    needs: resolve
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:

        include:
          - runner: windows-2025
            os: windows
            arch: x64
            rid: win-x64
            msvc_arch: x64
            msvc_host_arch: x64
          - runner: windows-2025
            os: windows
            arch: x86
            rid: win-x86
            msvc_arch: x86
            msvc_host_arch: x64
          - runner: windows-11-arm
            os: windows
            arch: arm64
            rid: win-arm64
            msvc_arch: arm64
            msvc_host_arch: arm64
          - runner: ubuntu-24.04
            os: linux
            arch: x64
            rid: linux-x64
          - runner: ubuntu-24.04
            os: linux
            arch: x86
            rid: linux-x86
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            rid: linux-arm64
          - runner: macos-15-intel
            os: macos
            arch: x64
            rid: osx-x64
            osx_arch: x86_64
          - runner: macos-latest
            os: macos
            arch: arm64
            rid: osx-arm64
            osx_arch: arm64

    env:
      BUILD_DIR: ${{ github.workspace }}/build
      INSTALL_PREFIX: ${{ github.workspace }}/install

    steps:

      - name: Checkout SDL
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL
          ref: ${{ needs.resolve.outputs.sdl_ref }}
          fetch-depth: 1
          submodules: recursive
          path: SDL

      - name: Checkout SDL_ttf
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL_ttf
          ref: ${{ needs.resolve.outputs.component_ref }}
          fetch-depth: 1
          submodules: recursive
          path: SDL_ttf

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          if [[ "${{ matrix.arch }}" == "x86" ]]; then
            packages=(build-essential gcc-multilib g++-multilib cmake ninja-build pkg-config git)
          else
            packages=(
              build-essential cmake ninja-build pkg-config git
              libasound2-dev libpulse-dev libjack-dev libsndio-dev
              libusb-1.0-0-dev libdbus-1-dev libudev-dev
              libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev
              libxi-dev libxss-dev libxtst-dev
              libwayland-dev wayland-protocols libxkbcommon-dev libdecor-0-dev
              libdrm-dev libgbm-dev libgl1-mesa-dev libegl1-mesa-dev
              libpipewire-0.3-dev libvulkan-dev
            )
          fi
          sudo apt-get install -y --no-install-recommends "${packages[@]}"

      - name: Build and install SDL_ttf stack (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe was not found." }
          $vs = (& $vswhere -latest -products * -property installationPath).Trim()
          if (-not $vs) { throw "No Visual Studio installation was found." }
          $devcmd = Join-Path $vs 'Common7\Tools\VsDevCmd.bat'
          if (-not (Test-Path $devcmd)) { throw "VsDevCmd.bat was not found at $devcmd" }
          
          $environment = & cmd.exe /d /s /c "`"$devcmd`" -no_logo -arch=${{ matrix.msvc_arch }} -host_arch=${{ matrix.msvc_host_arch }} && set"
          if ($LASTEXITCODE -ne 0) { throw "VsDevCmd failed with exit code $LASTEXITCODE." }
          foreach ($line in $environment) {
            if ($line -match '^([^=]+)=(.*)$') {
              [Environment]::SetEnvironmentVariable($matches[1], $matches[2], 'Process')
            }
          }
          
          Get-Command cl.exe -ErrorAction Stop | Out-Host
          Get-Command cmake.exe -ErrorAction Stop | Out-Host
          Get-Command ninja.exe -ErrorAction Stop | Out-Host
          $common = @(
            '-G', 'Ninja',
            '-DCMAKE_BUILD_TYPE=MinSizeRel',
            '-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON',
            '-DCMAKE_C_FLAGS_MINSIZEREL=/Os /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_CXX_FLAGS_MINSIZEREL=/Os /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF',
            '-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF'
          )
          $sdlOptions = @(
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            '-DSDL_INSTALL=ON',
            '-DSDL_SHARED=ON',
            '-DSDL_STATIC=OFF',
            '-DSDL_TESTS=OFF',
            '-DSDL_EXAMPLES=OFF',
            '-DSDL_INSTALL_DOCS=OFF',
            '-DSDL_INSTALL_TESTS=OFF'
          )
          & cmake -S SDL -B "$env:BUILD_DIR/SDL" @common @sdlOptions
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --build "$env:BUILD_DIR/SDL" --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --install "$env:BUILD_DIR/SDL"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $componentOptions = @(
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            "-DCMAKE_PREFIX_PATH=$env:INSTALL_PREFIX",
            '-DBUILD_SHARED_LIBS=ON',
            '-DSDLTTF_INSTALL=ON',
            '-DSDLTTF_INSTALL_MAN=OFF',
            '-DSDLTTF_INSTALL_CPACK=OFF',
            '-DSDLTTF_VENDORED=ON',
            '-DSDLTTF_SAMPLES=OFF',
            '-DSDLTTF_HARFBUZZ=ON',
            '-DSDLTTF_PLUTOSVG=OFF'
          )
          & cmake -S SDL_ttf -B "$env:BUILD_DIR/SDL_ttf" @common @componentOptions
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --build "$env:BUILD_DIR/SDL_ttf" --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --install "$env:BUILD_DIR/SDL_ttf"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build and install SDL_ttf stack (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          common=(
            -G Ninja
            -DCMAKE_BUILD_TYPE=MinSizeRel
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
          )
          
          cflags="-Os -flto -ffunction-sections -fdata-sections -DNDEBUG"
          cxxflags="$cflags"
          if [[ "${{ matrix.arch }}" == "x86" ]]; then
            cflags="$cflags -m32"
            cxxflags="$cxxflags -m32"
          fi
          
          if [[ "${{ matrix.os }}" == "macos" ]]; then
            ldflags="-flto -Wl,-dead_strip -Wl,-x"
            common+=("-DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}" -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0)
          else
            ldflags="-flto -Wl,--gc-sections -Wl,--as-needed -s"
            if [[ "${{ matrix.arch }}" == "x86" ]]; then
              ldflags="$ldflags -m32"
            fi
          fi
          
          common+=(
            "-DCMAKE_C_FLAGS_MINSIZEREL=$cflags"
            "-DCMAKE_CXX_FLAGS_MINSIZEREL=$cxxflags"
            "-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=$ldflags"
            "-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=$ldflags"
          )
          sdl_options=(
            "-DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX"
            -DSDL_INSTALL=ON
            -DSDL_SHARED=ON
            -DSDL_STATIC=OFF
            -DSDL_TESTS=OFF
            -DSDL_EXAMPLES=OFF
            -DSDL_INSTALL_DOCS=OFF
            -DSDL_INSTALL_TESTS=OFF
          )
          
          # A 32-bit Linux build is produced with SDL's dependency-free
          # dummy/offscreen backends to avoid linking accidental 64-bit system libraries.
          if [[ "${{ matrix.os }}" == "linux" && "${{ matrix.arch }}" == "x86" ]]; then
            sdl_options+=(
              -DSDL_X11=OFF -DSDL_WAYLAND=OFF -DSDL_KMSDRM=OFF
              -DSDL_ALSA=OFF -DSDL_PULSEAUDIO=OFF -DSDL_PIPEWIRE=OFF
              -DSDL_JACK=OFF -DSDL_SNDIO=OFF -DSDL_OSS=OFF
              -DSDL_DBUS=OFF -DSDL_IBUS=OFF -DSDL_LIBUDEV=OFF
              -DSDL_HIDAPI_LIBUSB=OFF
              -DSDL_OPENGL=OFF -DSDL_OPENGLES=OFF -DSDL_VULKAN=OFF
              -DSDL_OFFSCREEN=ON -DSDL_DUMMYVIDEO=ON -DSDL_DUMMYAUDIO=ON
            )
          fi
          cmake -S SDL -B "$BUILD_DIR/SDL" "${common[@]}" "${sdl_options[@]}"
          cmake --build "$BUILD_DIR/SDL" --parallel
          cmake --install "$BUILD_DIR/SDL" --strip

          component_options=(
            "-DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX"
            "-DCMAKE_PREFIX_PATH=$INSTALL_PREFIX"
            -DBUILD_SHARED_LIBS=ON
            -DSDLTTF_INSTALL=ON
            -DSDLTTF_INSTALL_MAN=OFF
            -DSDLTTF_INSTALL_CPACK=OFF
            -DSDLTTF_VENDORED=ON
            -DSDLTTF_SAMPLES=OFF
            -DSDLTTF_HARFBUZZ=ON
            -DSDLTTF_PLUTOSVG=OFF
          )
          cmake -S SDL_ttf -B "$BUILD_DIR/SDL_ttf" "${common[@]}" "${component_options[@]}"
          cmake --build "$BUILD_DIR/SDL_ttf" --parallel
          cmake --install "$BUILD_DIR/SDL_ttf" --strip


      - name: Upload SDL_ttf ${{ matrix.rid }}
        uses: actions/upload-artifact@v4
        with:
          name: SDL_ttf-${{ matrix.rid }}
          path: ${{ env.INSTALL_PREFIX }}/
          if-no-files-found: error
          compression-level: 9
