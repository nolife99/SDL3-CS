name: Build SDL_shadercross

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      artifact_prefix:
        description: Run-scoped artifact prefix used by the aggregate workflow
        required: false
        type: string
        default: ""

permissions:
  contents: read
  actions: write

jobs:
  resolve:
    name: Resolve SDL release and SDL_shadercross commit
    runs-on: ubuntu-24.04
    outputs:
      sdl_ref: ${{ steps.refs.outputs.sdl_ref }}
      shadercross_ref: ${{ steps.refs.outputs.shadercross_ref }}
    steps:
      - name: Resolve official refs
        id: refs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sdl_ref="$(gh api repos/libsdl-org/SDL/releases/latest --jq '.tag_name')"
          shadercross_ref="$(gh api repos/libsdl-org/SDL_shadercross/commits/main --jq '.sha')"
          test -n "$sdl_ref"
          test -n "$shadercross_ref"
          echo "sdl_ref=$sdl_ref" >> "$GITHUB_OUTPUT"
          echo "shadercross_ref=$shadercross_ref" >> "$GITHUB_OUTPUT"
          echo "Using SDL $sdl_ref and SDL_shadercross $shadercross_ref"

  build:
    name: SDL_shadercross ${{ matrix.rid }}
    needs: resolve
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:

        include:
          - runner: windows-2025
            os: windows
            arch: x64
            rid: win-x64
            msvc_arch: x64
            msvc_host_arch: x64
          - runner: windows-2025
            os: windows
            arch: x86
            rid: win-x86
            msvc_arch: x86
            msvc_host_arch: x64
          - runner: windows-11-arm
            os: windows
            arch: arm64
            rid: win-arm64
            msvc_arch: arm64
            msvc_host_arch: arm64
          - runner: ubuntu-24.04
            os: linux
            arch: x64
            rid: linux-x64
          - runner: ubuntu-24.04
            os: linux
            arch: x86
            rid: linux-x86
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            rid: linux-arm64
          - runner: macos-15-intel
            os: macos
            arch: x64
            rid: osx-x64
            osx_arch: x86_64
          - runner: macos-latest
            os: macos
            arch: arm64
            rid: osx-arm64
            osx_arch: arm64

    env:
      BUILD_DIR: ${{ github.workspace }}/build
      INSTALL_PREFIX: ${{ github.workspace }}/install
      ARTIFACT_DIR: ${{ github.workspace }}/handoff/SDL_shadercross/${{ matrix.rid }}

    steps:

      - name: Checkout SDL
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL
          ref: ${{ needs.resolve.outputs.sdl_ref }}
          fetch-depth: 1
          submodules: recursive
          path: SDL

      - name: Checkout SDL_shadercross
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL_shadercross
          ref: ${{ needs.resolve.outputs.shadercross_ref }}
          fetch-depth: 1
          submodules: recursive
          path: SDL_shadercross

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ matrix.rid }}" == "linux-x86" ]]; then
            # Build a real 32-bit desktop library on the x64 runner. X11 is
            # enabled; Wayland is disabled because its full 32-bit protocol/
            # decoration dependency chain is not reliably multiarch-packaged.
            sudo dpkg --add-architecture i386
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              build-essential gcc-multilib g++-multilib libc6-dev-i386 \
              cmake ninja-build pkg-config git file patchelf curl xz-utils \
              bison flex libjson-perl \
              libasound2-dev:i386 libusb-1.0-0-dev:i386 \
              libdbus-1-dev:i386 libudev-dev:i386 \
              libx11-dev:i386 libxext-dev:i386 libxrandr-dev:i386 \
              libxcursor-dev:i386 libxfixes-dev:i386 libxi-dev:i386 \
              libxss-dev:i386 libxtst-dev:i386 \
              libgl-dev:i386 libvulkan-dev:i386
          else
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              build-essential cmake ninja-build pkg-config git file patchelf curl xz-utils \
              bison flex libjson-perl \
              libasound2-dev libpulse-dev libjack-dev libsndio-dev \
              libusb-1.0-0-dev libdbus-1-dev libudev-dev \
              libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
              libxi-dev libxss-dev libxtst-dev \
              libwayland-dev wayland-protocols libxkbcommon-dev libdecor-0-dev \
              libdrm-dev libgbm-dev libgl1-mesa-dev libegl1-mesa-dev \
              libpipewire-0.3-dev libvulkan-dev
          fi

      - name: Install macOS vkd3d build dependencies
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          brew install bison flex pkg-config cpanminus
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix flex)/bin" >> "$GITHUB_PATH"
          # vkd3d's build scripts `use JSON` (not the core JSON::PP). Install it into the same Homebrew perl
          # that runs them so it lands on the default @INC; a contained local-lib + PERL5LIB did not
          # propagate through CMake/make to the build's perl.
          cpanm --notest JSON
          perl -MJSON -e 'print "Perl JSON available\n"'

      - name: Patch SDL_shadercross for statically linked vkd3d-utils
        if: matrix.os != 'windows'
        shell: python
        run: |
          from pathlib import Path
          import re

          source_path = Path("SDL_shadercross/src/SDL_shadercross.c")
          source = source_path.read_text(encoding="utf-8")

          marker = "static pfn_D3DCompile SDL_D3DCompile = NULL;"
          replacement = marker + """
          #ifdef SDL_SHADERCROSS_STATIC_VKD3D
          extern HRESULT __stdcall SDL_ShaderCross_StaticD3DCompile(
              LPCVOID pSrcData, SIZE_T SrcDataSize, LPCSTR pSourceName,
              const D3D_SHADER_MACRO *pDefines, ID3DInclude *pInclude,
              LPCSTR pEntrypoint, LPCSTR pTarget, UINT Flags1, UINT Flags2,
              ID3DBlob **ppCode, ID3DBlob **ppErrorMsgs);
          #endif"""
          if source.count(marker) != 1:
              raise RuntimeError("Unexpected SDL_D3DCompile declaration count")
          source = source.replace(marker, replacement)

          init_pattern = re.compile(
              r"bool SDL_ShaderCross_Init\(void\)\n\{\n"
              r".*?"
              r"\n    return true;\n\}",
              re.DOTALL,
          )
          init_replacement = """bool SDL_ShaderCross_Init(void)
          {
          #ifdef SDL_SHADERCROSS_STATIC_VKD3D
              SDL_D3DCompile = SDL_ShaderCross_StaticD3DCompile;
          #else
              d3dcompiler_dll = SDL_LoadObject(D3DCOMPILER_DLL);
              if (d3dcompiler_dll != NULL) {
                  SDL_D3DCompile = (pfn_D3DCompile)SDL_LoadFunction(d3dcompiler_dll, "D3DCompile");
                  if (SDL_D3DCompile == NULL) {
                      SDL_UnloadObject(d3dcompiler_dll);
                      d3dcompiler_dll = NULL;
                  }
              }
          #endif
              return true;
          }"""
          source, count = init_pattern.subn(init_replacement, source, count=1)
          if count != 1:
              raise RuntimeError("Could not patch SDL_ShaderCross_Init")

          quit_pattern = re.compile(
              r"void SDL_ShaderCross_Quit\(void\)\n\{\n"
              r".*?"
              r"\n\}",
              re.DOTALL,
          )
          quit_replacement = """void SDL_ShaderCross_Quit(void)
          {
          #ifndef SDL_SHADERCROSS_STATIC_VKD3D
              if (d3dcompiler_dll != NULL) {
                  SDL_UnloadObject(d3dcompiler_dll);
                  d3dcompiler_dll = NULL;
              }
          #endif
              SDL_D3DCompile = NULL;
          }"""
          source, count = quit_pattern.subn(quit_replacement, source, count=1)
          if count != 1:
              raise RuntimeError("Could not patch SDL_ShaderCross_Quit")

          # Capability reporting must key off the function pointer for the static path.
          capability_test = "if (d3dcompiler_dll != NULL) {\n        supportedFormats |= SDL_GPU_SHADERFORMAT_DXBC;"
          if source.count(capability_test) != 2:
              raise RuntimeError("Unexpected DXBC capability check count")
          source = source.replace(
              capability_test,
              "if (SDL_D3DCompile != NULL) {\n        supportedFormats |= SDL_GPU_SHADERFORMAT_DXBC;",
          )
          source_path.write_text(source, encoding="utf-8")

          wrapper = Path("SDL_shadercross/src/static_vkd3d.c")
          wrapper.write_text(
              "#include <vkd3d_utils.h>\n"
              "HRESULT WINAPI SDL_ShaderCross_StaticD3DCompile(\n"
              "    LPCVOID source, SIZE_T source_size, LPCSTR source_name,\n"
              "    const D3D_SHADER_MACRO *defines, ID3DInclude *include,\n"
              "    LPCSTR entrypoint, LPCSTR target, UINT flags1, UINT flags2,\n"
              "    ID3DBlob **code, ID3DBlob **errors)\n"
              "{\n"
              "    return D3DCompile(source, source_size, source_name, defines, include,\n"
              "                      entrypoint, target, flags1, flags2, code, errors);\n"
              "}\n",
              encoding="utf-8",
          )

          cmake_path = Path("SDL_shadercross/CMakeLists.txt")
          cmake = cmake_path.read_text(encoding="utf-8")
          # Upstream indents the source list with tabs; match the entry regardless of leading
          # whitespace and add the wrapper next to it (SOURCE_FILES feeds both the shared and static targets).
          source_pattern = re.compile(r"(?m)^([ \t]*)src/SDL_shadercross\.c[ \t]*$")
          if len(source_pattern.findall(cmake)) != 1:
              raise RuntimeError("Could not locate shadercross source list")
          cmake = source_pattern.sub(
              lambda match: match.group(1) + "src/SDL_shadercross.c\n" + match.group(1) + "src/static_vkd3d.c",
              cmake,
              count=1,
          )

          configure_marker = '"--enable-tests=no" "--enable-demos=no" "--disable-doxygen-doc"'
          if cmake.count(configure_marker) != 1:
              raise RuntimeError("Could not locate vkd3d configure arguments")
          cmake = cmake.replace(
              configure_marker,
              '"--enable-tests=no" "--enable-demos=no" "--disable-doxygen-doc" "--disable-shared" "--enable-static" "--libdir=<INSTALL_DIR>/lib"',
          )
          cmake = cmake.replace(
              '${configure_CFLAGS}',
              '${configure_CFLAGS} -fPIC',
              1,
          )
          loader_marker = '"-DCMAKE_PREFIX_PATH=${vulkan_headers_install_dir}"'
          if cmake.count(loader_marker) != 1:
              raise RuntimeError("Could not locate Vulkan-Loader CMake arguments")
          cmake = cmake.replace(
              loader_marker,
              loader_marker + ' "-DCMAKE_C_FLAGS=${configure_CFLAGS}" "-DCMAKE_SHARED_LINKER_FLAGS=${CMAKE_SHARED_LINKER_FLAGS}"',
          )

          property_pattern = re.compile(
              r"(?m)^[ \t]*ExternalProject_Get_property\(vkd3d SOURCE_DIR\)[ \t]*\n"
              r"[ \t]*ExternalProject_Get_property\(vkd3d INSTALL_DIR\)[ \t]*$"
          )
          if len(property_pattern.findall(cmake)) != 1:
              raise RuntimeError("Could not locate vkd3d external-project properties")
          static_link_suffix = """

              find_package(Threads REQUIRED)
              # vkd3d 2.0 installs its public headers into <prefix>/include/vkd3d/, and they
              # include each other with flat names (e.g. vkd3d_utils.h does #include <vkd3d.h>),
              # so the vkd3d subdirectory itself must be on the include path. Keep the parent too
              # for any consumer that spells the include as <vkd3d/...>.
              file(MAKE_DIRECTORY "${INSTALL_DIR}/include/vkd3d")
              add_library(vkd3d-utils-static STATIC IMPORTED GLOBAL)
              set_target_properties(vkd3d-utils-static PROPERTIES
                  IMPORTED_LOCATION "${INSTALL_DIR}/lib/libvkd3d-utils.a"
                  INTERFACE_INCLUDE_DIRECTORIES "${INSTALL_DIR}/include;${INSTALL_DIR}/include/vkd3d"
              )
              add_library(vkd3d-shader-static STATIC IMPORTED GLOBAL)
              set_target_properties(vkd3d-shader-static PROPERTIES
                  IMPORTED_LOCATION "${INSTALL_DIR}/lib/libvkd3d-shader.a"
                  INTERFACE_INCLUDE_DIRECTORIES "${INSTALL_DIR}/include;${INSTALL_DIR}/include/vkd3d"
              )
              add_dependencies(vkd3d-utils-static vkd3d)
              add_dependencies(vkd3d-shader-static vkd3d)
              foreach(target IN LISTS SDL3_shadercross_targets)
                  add_dependencies(${target} vkd3d)
                  target_compile_definitions(${target} PRIVATE SDL_SHADERCROSS_STATIC_VKD3D=1)
                  target_link_libraries(${target} PRIVATE
                      vkd3d-utils-static
                      vkd3d-shader-static
                      Threads::Threads
                      ${CMAKE_DL_LIBS}
                  )
                  if(NOT APPLE)
                      target_link_libraries(${target} PRIVATE m)
                  endif()
              endforeach()
          """
          cmake = property_pattern.sub(lambda match: match.group(0) + static_link_suffix, cmake, count=1)

          # Ninja can't see that the vkd3d ExternalProject produces the static archives the imported targets
          # consume ("missing and no known rule to make it"), so declare them as build byproducts.
          install_marker = '"make" "install"'
          if cmake.count(install_marker) != 1:
              raise RuntimeError("Could not locate vkd3d install command")
          cmake = cmake.replace(
              install_marker,
              install_marker + '\n\t\t\tBUILD_BYPRODUCTS "<INSTALL_DIR>/lib/libvkd3d-utils.a" "<INSTALL_DIR>/lib/libvkd3d-shader.a"',
              1,
          )

          cmake_path.write_text(cmake, encoding="utf-8")

      - name: Build and install SDL_shadercross stack (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe was not found." }
          $vs = (& $vswhere -latest -products * -property installationPath).Trim()
          if (-not $vs) { throw "No Visual Studio installation was found." }
          $devcmd = Join-Path $vs 'Common7\Tools\VsDevCmd.bat'
          if (-not (Test-Path $devcmd)) { throw "VsDevCmd.bat was not found at $devcmd" }
          
          $environment = & cmd.exe /d /s /c "`"$devcmd`" -no_logo -arch=${{ matrix.msvc_arch }} -host_arch=${{ matrix.msvc_host_arch }} && set"
          if ($LASTEXITCODE -ne 0) { throw "VsDevCmd failed with exit code $LASTEXITCODE." }
          foreach ($line in $environment) {
            if ($line -match '^([^=]+)=(.*)$') {
              [Environment]::SetEnvironmentVariable($matches[1], $matches[2], 'Process')
            }
          }
          
          Get-Command cl.exe -ErrorAction Stop | Out-Host
          Get-Command cmake.exe -ErrorAction Stop | Out-Host
          Get-Command ninja.exe -ErrorAction Stop | Out-Host
          $common = @(
            '-G', 'Ninja',
            '-DCMAKE_BUILD_TYPE=MinSizeRel',
            '-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON',
            '-DCMAKE_C_FLAGS_MINSIZEREL=/Os /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_CXX_FLAGS_MINSIZEREL=/Os /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF',
            '-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF'
          )
          $sdlOptions = @(
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            '-DSDL_INSTALL=ON',
            '-DSDL_SHARED=ON',
            '-DSDL_STATIC=OFF',
            '-DSDL_TESTS=OFF',
            '-DSDL_EXAMPLES=OFF',
            '-DSDL_INSTALL_DOCS=OFF',
            '-DSDL_INSTALL_TESTS=OFF'
          )
          & cmake -S SDL -B "$env:BUILD_DIR/SDL" @common @sdlOptions
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --build "$env:BUILD_DIR/SDL" --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --install "$env:BUILD_DIR/SDL"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $spvcOptions = @(
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            '-DSPIRV_CROSS_SHARED=OFF',
            '-DSPIRV_CROSS_STATIC=ON',
            '-DSPIRV_CROSS_CLI=OFF',
            '-DSPIRV_CROSS_ENABLE_TESTS=OFF',
            '-DSPIRV_CROSS_ENABLE_C_API=ON'
          )
          & cmake -S SDL_shadercross/external/SPIRV-Cross -B "$env:BUILD_DIR/SPIRV-Cross" @common @spvcOptions
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --build "$env:BUILD_DIR/SPIRV-Cross" --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --install "$env:BUILD_DIR/SPIRV-Cross"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $componentOptions = @(
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            "-DCMAKE_PREFIX_PATH=$env:INSTALL_PREFIX",
            '-DSDLSHADERCROSS_INSTALL=ON',
            '-DSDLSHADERCROSS_INSTALL_MAN=OFF',
            '-DSDLSHADERCROSS_INSTALL_CPACK=OFF',
            '-DSDLSHADERCROSS_INSTALL_RUNTIME=OFF',
            '-DSDLSHADERCROSS_SHARED=ON',
            '-DSDLSHADERCROSS_STATIC=OFF',
            '-DSDLSHADERCROSS_CLI=OFF',
            '-DSDLSHADERCROSS_TESTS=OFF',
            '-DSDLSHADERCROSS_VENDORED=OFF',
            '-DSDLSHADERCROSS_SPIRVCROSS_SHARED=OFF',
            '-DSDLSHADERCROSS_DXC=OFF'
          )
          & cmake -S SDL_shadercross -B "$env:BUILD_DIR/SDL_shadercross" @common @componentOptions
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --build "$env:BUILD_DIR/SDL_shadercross" --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --install "$env:BUILD_DIR/SDL_shadercross"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build and install SDL_shadercross stack (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          common=(
            -G Ninja
            -DCMAKE_BUILD_TYPE=MinSizeRel
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
          )
          
          cflags="-Os -flto -ffunction-sections -fdata-sections -DNDEBUG"
          cxxflags="$cflags"
          if [[ "${{ matrix.os }}" == "macos" ]]; then
            ldflags="-flto -Wl,-dead_strip -Wl,-x"
            common+=("-DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}" -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0)
          else
            ldflags="-flto -Wl,--gc-sections -Wl,--as-needed -s"
          fi

          if [[ "${{ matrix.rid }}" == "linux-x86" ]]; then
            # Force every configure/build in this stack to emit i386 code and
            # make pkg-config resolve the 32-bit X11/OpenGL/Vulkan libraries.
            export PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig:/usr/share/pkgconfig
            export PKG_CONFIG_PATH=
            common+=(
              -DCMAKE_SYSTEM_PROCESSOR=x86
              -DCMAKE_C_FLAGS=-m32
              -DCMAKE_CXX_FLAGS=-m32
              -DCMAKE_SHARED_LINKER_FLAGS=-m32
              -DCMAKE_EXE_LINKER_FLAGS=-m32
            )
          fi
          
          common+=(
            "-DCMAKE_C_FLAGS_MINSIZEREL=$cflags"
            "-DCMAKE_CXX_FLAGS_MINSIZEREL=$cxxflags"
            "-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=$ldflags"
            "-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=$ldflags"
          )
          sdl_options=(
            "-DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX"
            -DSDL_INSTALL=ON
            -DSDL_SHARED=ON
            -DSDL_STATIC=OFF
            -DSDL_TESTS=OFF
            -DSDL_EXAMPLES=OFF
            -DSDL_INSTALL_DOCS=OFF
            -DSDL_INSTALL_TESTS=OFF
          )

          if [[ "${{ matrix.rid }}" == "linux-x86" ]]; then
            sdl_options+=(
              -DSDL_X11=ON
              -DSDL_WAYLAND=OFF
              -DSDL_KMSDRM=OFF
              -DSDL_LIBDECOR=OFF
              -DSDL_OPENGL=ON
              -DSDL_OPENGLES=OFF
              -DSDL_VULKAN=ON
              -DSDL_ALSA=ON
              -DSDL_PULSEAUDIO=OFF
              -DSDL_JACK=OFF
              -DSDL_SNDIO=OFF
              -DSDL_PIPEWIRE=OFF
            )
          fi
          
          cmake -S SDL -B "$BUILD_DIR/SDL" "${common[@]}" "${sdl_options[@]}"
          cmake --build "$BUILD_DIR/SDL" --parallel
          cmake --install "$BUILD_DIR/SDL" --strip

          spvc_options=(
            "-DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX"
            -DSPIRV_CROSS_SHARED=OFF
            -DSPIRV_CROSS_STATIC=ON
            -DSPIRV_CROSS_CLI=OFF
            -DSPIRV_CROSS_ENABLE_TESTS=OFF
            -DSPIRV_CROSS_ENABLE_C_API=ON
          )
          cmake -S SDL_shadercross/external/SPIRV-Cross -B "$BUILD_DIR/SPIRV-Cross" "${common[@]}" "${spvc_options[@]}"
          cmake --build "$BUILD_DIR/SPIRV-Cross" --parallel
          cmake --install "$BUILD_DIR/SPIRV-Cross" --strip

          component_options=(
            "-DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX"
            "-DCMAKE_PREFIX_PATH=$INSTALL_PREFIX"
            -DSDLSHADERCROSS_INSTALL=ON
            -DSDLSHADERCROSS_INSTALL_MAN=OFF
            -DSDLSHADERCROSS_INSTALL_CPACK=OFF
            -DSDLSHADERCROSS_INSTALL_RUNTIME=ON
            -DSDLSHADERCROSS_SHARED=ON
            -DSDLSHADERCROSS_STATIC=OFF
            -DSDLSHADERCROSS_CLI=OFF
            -DSDLSHADERCROSS_TESTS=OFF
            -DSDLSHADERCROSS_VENDORED=OFF
            -DSDLSHADERCROSS_SPIRVCROSS_SHARED=OFF
            -DSDLSHADERCROSS_DXC=OFF
          )
          cmake -S SDL_shadercross -B "$BUILD_DIR/SDL_shadercross" "${common[@]}" "${component_options[@]}"
          cmake --build "$BUILD_DIR/SDL_shadercross" --parallel
          cmake --install "$BUILD_DIR/SDL_shadercross" --strip


          if [[ "${{ matrix.rid }}" == "linux-x86" ]]; then
            mapfile -d '' shared_objects < <(find "$INSTALL_PREFIX" -type f -name '*.so*' -print0)
            (( ${#shared_objects[@]} > 0 ))
            for shared_object in "${shared_objects[@]}"; do
              description="$(file -Lb "$shared_object")"
              echo "$shared_object: $description"
              [[ "$description" == *"ELF 32-bit"* ]]
            done
          fi


      - name: Stage minimal runtime binary (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Remove-Item $env:ARTIFACT_DIR -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $env:ARTIFACT_DIR | Out-Null

          $binary = Get-ChildItem -Path $env:INSTALL_PREFIX -Recurse -File -Filter 'SDL3_shadercross.dll' |
            Select-Object -First 1
          if (-not $binary) { throw 'Could not find SDL3_shadercross.dll under the install prefix.' }
          Copy-Item $binary.FullName (Join-Path $env:ARTIFACT_DIR 'SDL3_shadercross.dll') -Force

      - name: Stage minimal runtime binary (Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"

          canonical="libSDL3_shadercross.so"
          source="$(find "$INSTALL_PREFIX" -type f -name "libSDL3_shadercross.so*" -printf '%s %p\n' \
            | sort -nr | head -n 1 | cut -d' ' -f2-)"
          if [[ -z "$source" ]]; then
            echo "Could not find a real libSDL3_shadercross.so binary under $INSTALL_PREFIX." >&2
            exit 1
          fi

          target="$ARTIFACT_DIR/$canonical"
          cp "$source" "$target"
          chmod 755 "$target"
          patchelf --set-soname "$canonical" "$target"
          patchelf --set-rpath '$ORIGIN' "$target"

          while IFS= read -r dependency; do
            case "$dependency" in
              libSDL3.so.*)
                patchelf --replace-needed "$dependency" libSDL3.so "$target"
                ;;
            esac
          done < <(patchelf --print-needed "$target")

          [[ "$(patchelf --print-soname "$target")" == "$canonical" ]]
          if patchelf --print-needed "$target" | grep -Eiq 'vkd3d|dxcompiler|dxil'; then
            echo "Shadercross still has a dynamic shader-compiler dependency:" >&2
            patchelf --print-needed "$target" >&2
            exit 1
          fi
          find "$ARTIFACT_DIR" -maxdepth 1 -type f -printf '%f %s bytes\n'

      - name: Stage minimal runtime binary (macOS)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"

          canonical="libSDL3_shadercross.dylib"
          source="$(find "$INSTALL_PREFIX" -type f -name "libSDL3_shadercross*.dylib" -print \
            | while IFS= read -r path; do stat -f '%z %N' "$path"; done \
            | sort -nr | head -n 1 | cut -d' ' -f2-)"
          if [[ -z "$source" ]]; then
            echo "Could not find a real libSDL3_shadercross.dylib binary under $INSTALL_PREFIX." >&2
            exit 1
          fi

          target="$ARTIFACT_DIR/$canonical"
          cp "$source" "$target"
          chmod 755 "$target"
          install_name_tool -id "@rpath/$canonical" "$target"

          while IFS= read -r dependency; do
            dependency_basename="$(basename "$dependency")"
            case "$dependency_basename" in
              libSDL3.dylib|libSDL3.*.dylib)
                install_name_tool -change "$dependency" @loader_path/libSDL3.dylib "$target"
                ;;
            esac
          done < <(otool -L "$target" | tail -n +2 | awk '{print $1}')

          if otool -L "$target" | grep -Eiq 'vkd3d|dxcompiler|dxil'; then
            echo "Shadercross still has a dynamic shader-compiler dependency:" >&2
            otool -L "$target" >&2
            exit 1
          fi
          echo "Staged $target ($(stat -f '%z' "$target") bytes)"

      - name: Upload SDL_shadercross ${{ matrix.rid }} for collection
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_prefix != '' && inputs.artifact_prefix || format('sdl-native-{0}-{1}', github.run_id, github.run_attempt) }}-SDL_shadercross-${{ matrix.rid }}
          path: ${{ env.ARTIFACT_DIR }}/
          if-no-files-found: error
          compression-level: 9
          retention-days: 1

  collect:
    name: Collect SDL_shadercross runtime binaries
    runs-on: ubuntu-24.04
    needs: build
    env:
      HANDOFF_PREFIX: ${{ inputs.artifact_prefix != '' && inputs.artifact_prefix || format('sdl-native-{0}-{1}', github.run_id, github.run_attempt) }}

    steps:
      - name: Download SDL_shadercross win-x64
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL_shadercross-win-x64
          path: handoff/SDL_shadercross/win-x64

      - name: Download SDL_shadercross win-x86
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL_shadercross-win-x86
          path: handoff/SDL_shadercross/win-x86

      - name: Download SDL_shadercross win-arm64
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL_shadercross-win-arm64
          path: handoff/SDL_shadercross/win-arm64

      - name: Download SDL_shadercross linux-x64
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL_shadercross-linux-x64
          path: handoff/SDL_shadercross/linux-x64

      - name: Download SDL_shadercross linux-x86
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL_shadercross-linux-x86
          path: handoff/SDL_shadercross/linux-x86

      - name: Download SDL_shadercross linux-arm64
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL_shadercross-linux-arm64
          path: handoff/SDL_shadercross/linux-arm64

      - name: Download SDL_shadercross osx-x64
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL_shadercross-osx-x64
          path: handoff/SDL_shadercross/osx-x64

      - name: Download SDL_shadercross osx-arm64
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL_shadercross-osx-arm64
          path: handoff/SDL_shadercross/osx-arm64

      - name: Validate collected SDL_shadercross files
        shell: bash
        run: |
          set -euo pipefail
          root="handoff/SDL_shadercross"
          rids=(win-x64 win-x86 win-arm64 linux-x64 linux-x86 linux-arm64 osx-x64 osx-arm64)
          for rid in "${rids[@]}"; do
            directory="$root/$rid"
            [[ -d "$directory" ]] || { echo "Missing $directory" >&2; exit 1; }
            count="$(find "$directory" -maxdepth 1 -type f | wc -l)"
            [[ "$count" -eq 1 ]] || { find "$directory" -maxdepth 1 -type f -print; exit 1; }
          done
          find "$root" -type f -print | sort

      - name: Upload collected SDL_shadercross for aggregate workflow
        if: inputs.artifact_prefix != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL_shadercross
          path: handoff/SDL_shadercross/
          if-no-files-found: error
          compression-level: 9
          retention-days: 1

      - name: Upload standalone SDL_shadercross binaries
        if: inputs.artifact_prefix == ''
        uses: actions/upload-artifact@v4
        with:
          name: SDL3-CS.Native.Shadercross-binaries
          path: handoff/SDL_shadercross/
          if-no-files-found: error
          compression-level: 9

  cleanup:
    name: Delete temporary SDL_shadercross transfer artifacts
    if: always()
    runs-on: ubuntu-24.04
    needs: [build, collect]
    env:
      HANDOFF_PREFIX: ${{ inputs.artifact_prefix != '' && inputs.artifact_prefix || format('sdl-native-{0}-{1}', github.run_id, github.run_attempt) }}

    steps:
      - name: Delete temporary RID artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          delete_artifact() {
            local name="$1"
            local ids
            ids="$(gh api --paginate \
              "/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts?per_page=100" \
              --jq ".artifacts[] | select(.name == \"$name\") | .id")"
            for id in $ids; do
              gh api --method DELETE "/repos/$GITHUB_REPOSITORY/actions/artifacts/$id" >/dev/null || true
            done
          }
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-win-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-win-x86"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-win-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-linux-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-linux-x86"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-linux-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-osx-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-osx-arm64"
