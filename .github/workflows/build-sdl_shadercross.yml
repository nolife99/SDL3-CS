name: Build SDL_shadercross

on:
  workflow_dispatch:
    inputs:
      sdl-ref:
        description: SDL branch, tag, or commit
        required: true
        default: main
        type: string
      sdl-shadercross-ref:
        description: SDL_shadercross branch, tag, or commit
        required: true
        default: main
        type: string
      spirv-cross-ref:
        description: SPIRV-Cross branch, tag, or commit
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  build:
    name: SDL_shadercross ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            platform: windows
            arch: x64
            rid: win-x64
            cmake_arch: x64
            dxc: true
            dxc_arch: x64
          # Official DXC binary releases do not provide a Windows x86 runtime.
          - runner: windows-2025
            platform: windows
            arch: x86
            rid: win-x86
            cmake_arch: Win32
            dxc: false
          - runner: windows-11-arm
            platform: windows
            arch: arm64
            rid: win-arm64
            cmake_arch: ARM64
            dxc: true
            dxc_arch: arm64
          - runner: macos-15-intel
            platform: macos
            arch: x64
            rid: osx-x64
            osx_arch: x86_64
            dxc: false
          - runner: macos-latest
            platform: macos
            arch: arm64
            rid: osx-arm64
            osx_arch: arm64
            dxc: false
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
            rid: linux-x64
            dxc: false
          - runner: ubuntu-24.04
            platform: linux
            arch: x86
            rid: linux-x86
            dxc: false
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            rid: linux-arm64
            dxc: false

    env:
      BUILD_DIR: ${{ github.workspace }}/build
      INSTALL_PREFIX: ${{ github.workspace }}/install
      CMAKE_BUILD_TYPE: MinSizeRel

    steps:
      - name: Checkout SDL
        uses: actions/checkout@v4
        with:
          repository: edwardgushchin/SDL
          ref: ${{ inputs.sdl-ref }}
          fetch-depth: 1
          submodules: recursive
          path: SDL

      - name: Checkout SDL_shadercross
        uses: actions/checkout@v4
        with:
          repository: edwardgushchin/SDL_shadercross
          ref: ${{ inputs.sdl-shadercross-ref }}
          fetch-depth: 1
          submodules: recursive
          path: SDL_shadercross

      - name: Checkout SPIRV-Cross
        uses: actions/checkout@v4
        with:
          repository: KhronosGroup/SPIRV-Cross
          ref: ${{ inputs.spirv-cross-ref }}
          fetch-depth: 1
          path: SPIRV-Cross

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux' && matrix.arch != 'x86'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld ninja-build pkg-config \
            libasound2-dev libpulse-dev libpipewire-0.3-dev \
            libusb-1.0-0-dev libdbus-1-dev libudev-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxrender-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libdecor-0-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libvulkan-dev

      - name: Install Linux x86 cross-build dependencies
        if: matrix.platform == 'linux' && matrix.arch == 'x86'
        shell: bash
        run: |
          set -euxo pipefail
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld ninja-build pkg-config gcc-multilib g++-multilib \
            libasound2-dev:i386 libpulse-dev:i386 \
            libusb-1.0-0-dev:i386 libdbus-1-dev:i386 libudev-dev:i386 \
            libx11-dev:i386 libxext-dev:i386 libxrandr-dev:i386 libxcursor-dev:i386 \
            libxfixes-dev:i386 libxi-dev:i386 libxss-dev:i386 libxtst-dev:i386 \
            libxrender-dev:i386 libwayland-dev:i386 wayland-protocols \
            libxkbcommon-dev:i386 libdrm-dev:i386 \
            libgbm-dev:i386 libgl1-mesa-dev:i386 libegl1-mesa-dev:i386 \
            libgles2-mesa-dev:i386

      - name: Configure SDL (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $args = @(
            '-S', 'SDL',
            '-B', "$env:BUILD_DIR/SDL",
            '-G', 'Visual Studio 17 2022',
            '-A', '${{ matrix.cmake_arch }}',
            "-DCMAKE_BUILD_TYPE=$env:CMAKE_BUILD_TYPE",
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            '-DCMAKE_INSTALL_LIBDIR=lib',
            '-DCMAKE_INSTALL_BINDIR=bin',
            '-DCMAKE_INTERPROCEDURAL_OPTIMIZATION_MINSIZEREL=ON',
            '-DCMAKE_C_FLAGS_MINSIZEREL=/O1 /Ob1 /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_CXX_FLAGS_MINSIZEREL=/O1 /Ob1 /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF /INCREMENTAL:NO',
            '-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF /INCREMENTAL:NO',
            '-DSDL_SHARED=ON',
            '-DSDL_STATIC=OFF',
            '-DSDL_INSTALL=ON',
            '-DSDL_INSTALL_DOCS=OFF',
            '-DSDL_TEST_LIBRARY=OFF',
            '-DSDL_TESTS=OFF',
            '-DSDL_EXAMPLES=OFF'
          )
          & cmake @args
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Configure SDL (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euxo pipefail
          cflags='-Oz -ffunction-sections -fdata-sections -fno-ident -flto'
          ldflags='-flto'
          extra=()

          if [[ '${{ matrix.platform }}' == 'linux' ]]; then
            export CC=clang CXX=clang++
            ldflags+=' -fuse-ld=lld -Wl,-O2 -Wl,--gc-sections -Wl,--icf=all -Wl,--as-needed -Wl,--strip-all'
          else
            ldflags+=' -Wl,-dead_strip -Wl,-x'
            extra+=(
              '-DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}'
              '-DCMAKE_OSX_DEPLOYMENT_TARGET=12.0'
            )
          fi

          if [[ '${{ matrix.arch }}' == 'x86' ]]; then
            cflags+=' -m32'
            ldflags+=' -m32'
            export PKG_CONFIG_PATH=
            export PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig:/usr/share/pkgconfig
            extra+=(
              '-DSDL_PIPEWIRE=OFF'
              '-DSDL_WAYLAND_LIBDECOR=OFF'
              '-DSDL_VULKAN=OFF'
              '-DSDL_RENDER_VULKAN=OFF'
            )
          fi

          cmake -S SDL -B "$BUILD_DIR/SDL" -G Ninja \
            -DCMAKE_BUILD_TYPE="$CMAKE_BUILD_TYPE" \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX" \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DCMAKE_INSTALL_BINDIR=bin \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION_MINSIZEREL=ON \
            "-DCMAKE_C_FLAGS_MINSIZEREL=$cflags" \
            "-DCMAKE_CXX_FLAGS_MINSIZEREL=$cflags" \
            "-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=$ldflags" \
            "-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=$ldflags" \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            -DSDL_INSTALL=ON \
            -DSDL_INSTALL_DOCS=OFF \
            -DSDL_TEST_LIBRARY=OFF \
            -DSDL_TESTS=OFF \
            -DSDL_EXAMPLES=OFF \
            "${extra[@]}"

      - name: Build SDL (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake --build "$env:BUILD_DIR/SDL" --config $env:CMAKE_BUILD_TYPE --parallel

      - name: Build SDL (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: cmake --build "$BUILD_DIR/SDL" --config "$CMAKE_BUILD_TYPE" --parallel

      - name: Install SDL (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake --install "$env:BUILD_DIR/SDL" --config $env:CMAKE_BUILD_TYPE

      - name: Install SDL (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: cmake --install "$BUILD_DIR/SDL" --config "$CMAKE_BUILD_TYPE" --strip

      - name: Configure SPIRV-Cross (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $args = @(
            '-S', 'SPIRV-Cross',
            '-B', "$env:BUILD_DIR/SPIRV-Cross",
            '-G', 'Visual Studio 17 2022',
            '-A', '${{ matrix.cmake_arch }}',
            "-DCMAKE_BUILD_TYPE=$env:CMAKE_BUILD_TYPE",
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            '-DCMAKE_INSTALL_LIBDIR=lib',
            '-DCMAKE_INSTALL_BINDIR=bin',
            '-DCMAKE_INTERPROCEDURAL_OPTIMIZATION_MINSIZEREL=ON',
            '-DCMAKE_C_FLAGS_MINSIZEREL=/O1 /Ob1 /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_CXX_FLAGS_MINSIZEREL=/O1 /Ob1 /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF /INCREMENTAL:NO',
            '-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF /INCREMENTAL:NO',
            '-DSPIRV_CROSS_SHARED=OFF',
            '-DSPIRV_CROSS_STATIC=ON',
            '-DSPIRV_CROSS_CLI=OFF',
            '-DSPIRV_CROSS_ENABLE_TESTS=OFF',
            '-DSPIRV_CROSS_ENABLE_C_API=ON',
            '-DSPIRV_CROSS_ENABLE_GLSL=ON',
            '-DSPIRV_CROSS_ENABLE_HLSL=ON',
            '-DSPIRV_CROSS_ENABLE_MSL=ON',
            '-DSPIRV_CROSS_ENABLE_CPP=OFF',
            '-DSPIRV_CROSS_ENABLE_REFLECT=OFF',
            '-DSPIRV_CROSS_ENABLE_UTIL=OFF',
            '-DSPIRV_CROSS_FORCE_PIC=ON',
            '-DSPIRV_CROSS_SKIP_INSTALL=OFF'
          )
          & cmake @args
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Configure SPIRV-Cross (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euxo pipefail
          cflags='-Oz -ffunction-sections -fdata-sections -fno-ident -flto'
          ldflags='-flto'
          extra=()

          if [[ '${{ matrix.platform }}' == 'linux' ]]; then
            export CC=clang CXX=clang++
            ldflags+=' -fuse-ld=lld -Wl,-O2 -Wl,--gc-sections -Wl,--icf=all -Wl,--as-needed -Wl,--strip-all'
          else
            ldflags+=' -Wl,-dead_strip -Wl,-x'
            extra+=(
              '-DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}'
              '-DCMAKE_OSX_DEPLOYMENT_TARGET=12.0'
            )
          fi

          if [[ '${{ matrix.arch }}' == 'x86' ]]; then
            cflags+=' -m32'
            ldflags+=' -m32'
          fi

          cmake -S SPIRV-Cross -B "$BUILD_DIR/SPIRV-Cross" -G Ninja \
            -DCMAKE_BUILD_TYPE="$CMAKE_BUILD_TYPE" \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX" \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DCMAKE_INSTALL_BINDIR=bin \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION_MINSIZEREL=ON \
            "-DCMAKE_C_FLAGS_MINSIZEREL=$cflags" \
            "-DCMAKE_CXX_FLAGS_MINSIZEREL=$cflags" \
            "-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=$ldflags" \
            "-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=$ldflags" \
            -DSPIRV_CROSS_SHARED=OFF \
            -DSPIRV_CROSS_STATIC=ON \
            -DSPIRV_CROSS_CLI=OFF \
            -DSPIRV_CROSS_ENABLE_TESTS=OFF \
            -DSPIRV_CROSS_ENABLE_C_API=ON \
            -DSPIRV_CROSS_ENABLE_GLSL=ON \
            -DSPIRV_CROSS_ENABLE_HLSL=ON \
            -DSPIRV_CROSS_ENABLE_MSL=ON \
            -DSPIRV_CROSS_ENABLE_CPP=OFF \
            -DSPIRV_CROSS_ENABLE_REFLECT=OFF \
            -DSPIRV_CROSS_ENABLE_UTIL=OFF \
            -DSPIRV_CROSS_FORCE_PIC=ON \
            -DSPIRV_CROSS_SKIP_INSTALL=OFF \
            "${extra[@]}"

      - name: Build SPIRV-Cross (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake --build "$env:BUILD_DIR/SPIRV-Cross" --config $env:CMAKE_BUILD_TYPE --parallel

      - name: Build SPIRV-Cross (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: cmake --build "$BUILD_DIR/SPIRV-Cross" --config "$CMAKE_BUILD_TYPE" --parallel

      - name: Install SPIRV-Cross (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake --install "$env:BUILD_DIR/SPIRV-Cross" --config $env:CMAKE_BUILD_TYPE

      - name: Install SPIRV-Cross (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: cmake --install "$BUILD_DIR/SPIRV-Cross" --config "$CMAKE_BUILD_TYPE"

      - name: Download DXC runtime
        if: matrix.dxc
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $headers = @{
            'User-Agent' = 'SDL3-CS-CI'
            'Accept' = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
            'Authorization' = "Bearer $env:GITHUB_TOKEN"
          }

          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/microsoft/DirectXShaderCompiler/releases/latest' -Headers $headers
          $asset = $release.assets |
            Where-Object { $_.name -like 'dxc_*.zip' -and $_.name -notlike 'pdb_*' } |
            Select-Object -First 1
          if (-not $asset) { throw 'DXC release ZIP was not found.' }

          $dest = Join-Path $env:GITHUB_WORKSPACE 'SDL_shadercross/external/DirectXShaderCompiler-binaries'
          $zip = Join-Path $env:RUNNER_TEMP $asset.name
          Remove-Item $dest -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force

          $top = Get-ChildItem $dest -Directory -Filter 'dxc_*' | Select-Object -First 1
          if ($top -and (Test-Path (Join-Path $top.FullName 'bin'))) {
            Get-ChildItem $top.FullName -Force | ForEach-Object {
              Move-Item $_.FullName $dest -Force
            }
            Remove-Item $top.FullName -Recurse -Force
          }

          $arch = '${{ matrix.dxc_arch }}'
          if (!(Test-Path (Join-Path $dest "bin/$arch/dxcompiler.dll"))) {
            throw "DXC does not contain bin/$arch/dxcompiler.dll"
          }
          if (!(Test-Path (Join-Path $dest "lib/$arch/dxcompiler.lib"))) {
            throw "DXC does not contain lib/$arch/dxcompiler.lib"
          }

      - name: Configure SDL_shadercross (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dxc = if ('${{ matrix.dxc }}' -eq 'true') { 'ON' } else { 'OFF' }
          $args = @(
            '-S', 'SDL_shadercross',
            '-B', "$env:BUILD_DIR/SDL_shadercross",
            '-G', 'Visual Studio 17 2022',
            '-A', '${{ matrix.cmake_arch }}',
            "-DCMAKE_BUILD_TYPE=$env:CMAKE_BUILD_TYPE",
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            "-DCMAKE_PREFIX_PATH=$env:INSTALL_PREFIX",
            '-DCMAKE_INSTALL_LIBDIR=lib',
            '-DCMAKE_INSTALL_BINDIR=bin',
            '-DCMAKE_INTERPROCEDURAL_OPTIMIZATION_MINSIZEREL=ON',
            '-DCMAKE_C_FLAGS_MINSIZEREL=/O1 /Ob1 /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_CXX_FLAGS_MINSIZEREL=/O1 /Ob1 /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF /INCREMENTAL:NO',
            '-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF /INCREMENTAL:NO',
            '-DSDLSHADERCROSS_INSTALL=ON',
            '-DSDLSHADERCROSS_INSTALL_MAN=OFF',
            '-DSDLSHADERCROSS_INSTALL_RUNTIME=OFF',
            '-DSDLSHADERCROSS_SHARED=ON',
            '-DSDLSHADERCROSS_STATIC=OFF',
            '-DSDLSHADERCROSS_CLI=OFF',
            '-DSDLSHADERCROSS_TESTS=OFF',
            '-DSDLSHADERCROSS_VENDORED=OFF',
            '-DSDLSHADERCROSS_SPIRVCROSS_SHARED=OFF',
            "-DSDLSHADERCROSS_DXC=$dxc"
          )
          & cmake @args
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Configure SDL_shadercross (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euxo pipefail
          cflags='-Oz -ffunction-sections -fdata-sections -fno-ident -flto'
          ldflags='-flto'
          extra=()

          if [[ '${{ matrix.platform }}' == 'linux' ]]; then
            export CC=clang CXX=clang++
            ldflags+=' -fuse-ld=lld -Wl,-O2 -Wl,--gc-sections -Wl,--icf=all -Wl,--as-needed -Wl,--strip-all'
          else
            ldflags+=' -Wl,-dead_strip -Wl,-x'
            extra+=(
              '-DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}'
              '-DCMAKE_OSX_DEPLOYMENT_TARGET=12.0'
            )
          fi

          if [[ '${{ matrix.arch }}' == 'x86' ]]; then
            cflags+=' -m32'
            ldflags+=' -m32'
          fi

          cmake -S SDL_shadercross -B "$BUILD_DIR/SDL_shadercross" -G Ninja \
            -DCMAKE_BUILD_TYPE="$CMAKE_BUILD_TYPE" \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX" \
            -DCMAKE_PREFIX_PATH="$INSTALL_PREFIX" \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DCMAKE_INSTALL_BINDIR=bin \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION_MINSIZEREL=ON \
            "-DCMAKE_C_FLAGS_MINSIZEREL=$cflags" \
            "-DCMAKE_CXX_FLAGS_MINSIZEREL=$cflags" \
            "-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=$ldflags" \
            "-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=$ldflags" \
            -DSDLSHADERCROSS_INSTALL=ON \
            -DSDLSHADERCROSS_INSTALL_MAN=OFF \
            -DSDLSHADERCROSS_INSTALL_RUNTIME=OFF \
            -DSDLSHADERCROSS_SHARED=ON \
            -DSDLSHADERCROSS_STATIC=OFF \
            -DSDLSHADERCROSS_CLI=OFF \
            -DSDLSHADERCROSS_TESTS=OFF \
            -DSDLSHADERCROSS_VENDORED=OFF \
            -DSDLSHADERCROSS_SPIRVCROSS_SHARED=OFF \
            -DSDLSHADERCROSS_DXC=OFF \
            "${extra[@]}"

      - name: Build SDL_shadercross (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake --build "$env:BUILD_DIR/SDL_shadercross" --config $env:CMAKE_BUILD_TYPE --parallel

      - name: Build SDL_shadercross (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: cmake --build "$BUILD_DIR/SDL_shadercross" --config "$CMAKE_BUILD_TYPE" --parallel

      - name: Install SDL_shadercross (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake --install "$env:BUILD_DIR/SDL_shadercross" --config $env:CMAKE_BUILD_TYPE

      - name: Install SDL_shadercross (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: cmake --install "$BUILD_DIR/SDL_shadercross" --config "$CMAKE_BUILD_TYPE" --strip

      - name: Copy required DXC DLLs
        if: matrix.dxc
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = Join-Path $env:GITHUB_WORKSPACE 'SDL_shadercross/external/DirectXShaderCompiler-binaries'
          $source = Join-Path $root 'bin/${{ matrix.dxc_arch }}'
          $dest = Join-Path $env:INSTALL_PREFIX 'bin'
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item (Join-Path $source 'dxcompiler.dll') $dest -Force
          Copy-Item (Join-Path $source 'dxil.dll') $dest -Force

      - name: Remove intermediate SPIRV-Cross development files (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem "$env:INSTALL_PREFIX/lib" -File -Filter 'spirv-cross*.lib' -ErrorAction SilentlyContinue |
            Remove-Item -Force
          Get-ChildItem $env:INSTALL_PREFIX -Recurse -Directory -Filter 'spirv_cross_*' -ErrorAction SilentlyContinue |
            Remove-Item -Recurse -Force

      - name: Remove intermediate SPIRV-Cross development files (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euxo pipefail
          find "$INSTALL_PREFIX/lib" -maxdepth 1 -type f -name 'libspirv-cross*.a' -delete || true
          find "$INSTALL_PREFIX/lib" -maxdepth 2 -type f -name 'spirv-cross*.pc' -delete || true
          find "$INSTALL_PREFIX" -type d -name 'spirv_cross_*' -prune -exec rm -rf {} + || true

      - name: Remove non-runtime Windows build files
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem $env:INSTALL_PREFIX -Recurse -File -Include *.pdb,*.exp,*.ilk |
            Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Verify installed binaries (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem $env:INSTALL_PREFIX -Recurse -File
          $files | ForEach-Object { $_.FullName }
          if (-not ($files | Where-Object Name -eq 'SDL3_shadercross.dll')) {
            throw 'SDL3_shadercross.dll was not installed.'
          }
          if ('${{ matrix.dxc }}' -eq 'true') {
            if (-not (Test-Path "$env:INSTALL_PREFIX/bin/dxcompiler.dll")) { throw 'dxcompiler.dll is missing.' }
            if (-not (Test-Path "$env:INSTALL_PREFIX/bin/dxil.dll")) { throw 'dxil.dll is missing.' }
          }

      - name: Verify installed binaries (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euxo pipefail
          find "$INSTALL_PREFIX" -maxdepth 5 -type f -print
          test -n "$(find "$INSTALL_PREFIX" -type f \( -name 'libSDL3_shadercross.so*' -o -name 'libSDL3_shadercross*.dylib' \) -print -quit)"

      - name: Upload SDL_shadercross ${{ matrix.rid }}
        uses: actions/upload-artifact@v4
        with:
          name: SDL_shadercross-${{ matrix.rid }}
          path: ${{ env.INSTALL_PREFIX }}/
          if-no-files-found: error
          compression-level: 9
