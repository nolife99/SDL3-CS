name: Build and collect SDL native binaries

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  actions: write

env:
  HANDOFF_PREFIX: sdl-native-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  sdl:
    name: Build SDL
    uses: ./.github/workflows/build-sdl.yml
    with:
      artifact_prefix: sdl-native-${{ github.run_id }}-${{ github.run_attempt }}

  sdl_image:
    name: Build SDL_image
    uses: ./.github/workflows/build-sdl_image.yml
    with:
      artifact_prefix: sdl-native-${{ github.run_id }}-${{ github.run_attempt }}

  sdl_mixer:
    name: Build SDL_mixer
    uses: ./.github/workflows/build-sdl_mixer.yml
    with:
      artifact_prefix: sdl-native-${{ github.run_id }}-${{ github.run_attempt }}

  sdl_ttf:
    name: Build SDL_ttf
    uses: ./.github/workflows/build-sdl_ttf.yml
    with:
      artifact_prefix: sdl-native-${{ github.run_id }}-${{ github.run_attempt }}

  sdl_shadercross:
    name: Build SDL_shadercross
    uses: ./.github/workflows/build-sdl_shadercross.yml
    with:
      artifact_prefix: sdl-native-${{ github.run_id }}-${{ github.run_attempt }}

  collect:
    name: Collect drop-in binary trees
    runs-on: ubuntu-24.04
    needs: [sdl, sdl_image, sdl_mixer, sdl_ttf, sdl_shadercross]

    steps:
      - name: Download SDL
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL
          path: handoff/SDL

      - name: Download SDL_image
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL_image
          path: handoff/SDL_image

      - name: Download SDL_mixer
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL_mixer
          path: handoff/SDL_mixer

      - name: Download SDL_ttf
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL_ttf
          path: handoff/SDL_ttf

      - name: Download SDL_shadercross
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.HANDOFF_PREFIX }}-SDL_shadercross
          path: handoff/SDL_shadercross

      - name: Assemble drop-in lib directories
        shell: bash
        run: |
          set -euo pipefail
          output="$GITHUB_WORKSPACE/SDL3-CS.Native-binaries"
          rm -rf "$output"
          mkdir -p "$output"

          declare -A projects=(
            [SDL]=SDL3-CS.Native
            [SDL_image]=SDL3-CS.Native.Image
            [SDL_mixer]=SDL3-CS.Native.Mixer
            [SDL_ttf]=SDL3-CS.Native.TTF
            [SDL_shadercross]=SDL3-CS.Native.Shadercross
          )
          rids=(win-x64 win-x86 win-arm64 linux-x64 linux-x86 linux-arm64 osx-x64 osx-arm64)

          for library in SDL SDL_image SDL_mixer SDL_ttf SDL_shadercross; do
            project="${projects[$library]}"
            for rid in "${rids[@]}"; do
              source="handoff/$library/$rid"
              destination="$output/$project/lib/$rid"
              [[ -d "$source" ]] || { echo "Missing $source" >&2; exit 1; }
              mkdir -p "$destination"
              cp -a "$source/." "$destination/"
            done
          done

          # Only runtime binaries are permitted in the final output.
          if find "$output" -type f ! \( -name '*.dll' -o -name '*.so' -o -name '*.dylib' \) -print -quit | grep -q .; then
            echo 'Unexpected non-binary file in output.' >&2
            find "$output" -type f -print >&2
            exit 1
          fi

          find "$output" -type f -print | sort

      - name: Upload the only workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SDL3-CS.Native-binaries
          path: SDL3-CS.Native-binaries/
          if-no-files-found: error
          compression-level: 9
          retention-days: 7

  cleanup:
    name: Delete temporary transfer artifacts
    if: always()
    runs-on: ubuntu-24.04
    needs: [sdl, sdl_image, sdl_mixer, sdl_ttf, sdl_shadercross, collect]

    steps:
      - name: Delete every intermediate artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          delete_artifact() {
            local name="$1"
            local ids
            ids="$(gh api --paginate \
              "/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts?per_page=100" \
              --jq ".artifacts[] | select(.name == \"$name\") | .id")"
            for id in $ids; do
              gh api --method DELETE "/repos/$GITHUB_REPOSITORY/actions/artifacts/$id" >/dev/null || true
            done
          }
            delete_artifact "$HANDOFF_PREFIX-SDL"
            delete_artifact "$HANDOFF_PREFIX-SDL-win-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL-win-x86"
            delete_artifact "$HANDOFF_PREFIX-SDL-win-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL-linux-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL-linux-x86"
            delete_artifact "$HANDOFF_PREFIX-SDL-linux-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL-osx-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL-osx-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_image"
            delete_artifact "$HANDOFF_PREFIX-SDL_image-win-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_image-win-x86"
            delete_artifact "$HANDOFF_PREFIX-SDL_image-win-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_image-linux-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_image-linux-x86"
            delete_artifact "$HANDOFF_PREFIX-SDL_image-linux-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_image-osx-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_image-osx-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_mixer"
            delete_artifact "$HANDOFF_PREFIX-SDL_mixer-win-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_mixer-win-x86"
            delete_artifact "$HANDOFF_PREFIX-SDL_mixer-win-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_mixer-linux-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_mixer-linux-x86"
            delete_artifact "$HANDOFF_PREFIX-SDL_mixer-linux-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_mixer-osx-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_mixer-osx-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_ttf"
            delete_artifact "$HANDOFF_PREFIX-SDL_ttf-win-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_ttf-win-x86"
            delete_artifact "$HANDOFF_PREFIX-SDL_ttf-win-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_ttf-linux-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_ttf-linux-x86"
            delete_artifact "$HANDOFF_PREFIX-SDL_ttf-linux-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_ttf-osx-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_ttf-osx-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-win-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-win-x86"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-win-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-linux-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-linux-x86"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-linux-arm64"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-osx-x64"
            delete_artifact "$HANDOFF_PREFIX-SDL_shadercross-osx-arm64"
