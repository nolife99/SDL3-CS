name: Build and package SDL native libraries

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  sdl:
    name: Build SDL
    uses: ./.github/workflows/build-sdl.yml

  sdl_image:
    name: Build SDL_image
    uses: ./.github/workflows/build-sdl_image.yml

  sdl_mixer:
    name: Build SDL_mixer
    uses: ./.github/workflows/build-sdl_mixer.yml

  sdl_ttf:
    name: Build SDL_ttf
    uses: ./.github/workflows/build-sdl_ttf.yml

  sdl_shadercross:
    name: Build SDL_shadercross
    uses: ./.github/workflows/build-sdl_shadercross.yml

  package:
    name: Collect all native libraries
    runs-on: ubuntu-24.04
    needs: [sdl, sdl_image, sdl_mixer, sdl_ttf, sdl_shadercross]

    steps:
      - name: Download all component artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: SDL-*
          merge-multiple: false

      - name: Download all SDL extension artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: SDL_*-*
          merge-multiple: false

      - name: Assemble library-separated runtime package
        shell: bash
        run: |
          set -euo pipefail

          package_root="$GITHUB_WORKSPACE/SDL-native-libraries"
          rids=(win-x64 win-x86 win-arm64 linux-x64 linux-x86 linux-arm64 osx-x64 osx-arm64)
          libraries=(SDL SDL_image SDL_mixer SDL_ttf SDL_shadercross)

          declare -A binary_names=(
            [SDL]=SDL3
            [SDL_image]=SDL3_image
            [SDL_mixer]=SDL3_mixer
            [SDL_ttf]=SDL3_ttf
            [SDL_shadercross]=SDL3_shadercross
          )

          copy_component() {
            local library="$1"
            local rid="$2"
            local source_root="$GITHUB_WORKSPACE/artifacts/${library}-${rid}"
            local destination="$package_root/$library/runtimes/$rid/native"
            local binary="${binary_names[$library]}"

            if [[ ! -d "$source_root" ]]; then
              echo "Missing artifact: ${library}-${rid}" >&2
              find "$GITHUB_WORKSPACE/artifacts" -maxdepth 2 -type d -print >&2 || true
              return 1
            fi

            mkdir -p "$destination"
            case "$rid" in
              win-*)
                mapfile -d '' files < <(find "$source_root" -type f -iname "$binary.dll" -print0)
                ;;
              linux-*)
                mapfile -d '' files < <(find "$source_root" \( -type f -o -type l \) -name "lib$binary.so*" -print0)
                ;;
              osx-*)
                mapfile -d '' files < <(find "$source_root" \( -type f -o -type l \) -name "lib$binary*.dylib" -print0)
                ;;
            esac

            if (( ${#files[@]} == 0 )); then
              echo "No $binary runtime binary found in ${library}-${rid}." >&2
              find "$source_root" -maxdepth 4 -type f -print >&2 || true
              return 1
            fi

            declare -A copied=()
            for source in "${files[@]}"; do
              name="$(basename "$source")"
              if [[ -z "${copied[$name]+x}" ]]; then
                cp -L "$source" "$destination/$name"
                copied[$name]=1
              fi
            done

            if [[ "$library" == "SDL_shadercross" && ( "$rid" == "win-x64" || "$rid" == "win-arm64" ) ]]; then
              for dependency in dxcompiler.dll dxil.dll; do
                match="$(find "$source_root" -type f -iname "$dependency" -print -quit)"
                if [[ -z "$match" ]]; then
                  echo "Missing $dependency in ${library}-${rid}." >&2
                  return 1
                fi
                cp -L "$match" "$destination/$dependency"
              done
            fi
          }

          for library in "${libraries[@]}"; do
            for rid in "${rids[@]}"; do
              copy_component "$library" "$rid"
            done
          done

          cat > "$package_root/README.txt" <<'EOF'
          SDL native libraries for .NET P/Invoke

          Each component is isolated in its own directory:

            SDL/runtimes/<rid>/native/
            SDL_image/runtimes/<rid>/native/
            SDL_mixer/runtimes/<rid>/native/
            SDL_ttf/runtimes/<rid>/native/
            SDL_shadercross/runtimes/<rid>/native/

          SDL_image, SDL_mixer, SDL_ttf, and SDL_shadercross require the SDL
          binary for the same RID. Because the component files are separated,
          either copy the selected RID's files together beside the managed
          executable or register a NativeLibrary/DllImportResolver that searches
          the component directories.

          SDL_shadercross statically links SPIRV-Cross. Its Windows x64 and
          ARM64 directories also include the official dxcompiler.dll and
          dxil.dll runtime files required for HLSL compilation. Windows x86
          is built without DXC because official DXC releases do not provide
          an x86 runtime.

          Linux x64 and ARM64 are full desktop builds with X11, Wayland,
          OpenGL, OpenGL ES, and Vulkan support. Linux x86 is a real 32-bit
          desktop build with X11, OpenGL, and Vulkan support; Wayland is
          intentionally disabled for that RID.

          SDL_shadercross enables DXC only on supported Windows targets. The
          Linux and macOS builds omit DXC and do not bundle the optional
          vkd3d runtime translation libraries.
          EOF

          (
            cd "$package_root"
            find . -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
          )

          expected=$(( ${#libraries[@]} * ${#rids[@]} ))
          actual="$(find "$package_root" -mindepth 4 -maxdepth 4 -type d -name native | wc -l)"
          [[ "$actual" -eq "$expected" ]]

          zip -9 -r SDL-native-libraries.zip SDL-native-libraries
          unzip -t SDL-native-libraries.zip

      - name: Upload combined package
        uses: actions/upload-artifact@v4
        with:
          name: SDL-native-libraries
          path: SDL-native-libraries.zip
          if-no-files-found: error
          compression-level: 0
