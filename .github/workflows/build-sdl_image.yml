name: Build SDL_image

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve latest stable releases
    runs-on: ubuntu-24.04
    outputs:
      sdl_ref: ${{ steps.refs.outputs.sdl_ref }}
      component_ref: ${{ steps.refs.outputs.component_ref }}
    steps:
      - name: Resolve official release tags
        id: refs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sdl_ref="$(gh api repos/libsdl-org/SDL/releases/latest --jq '.tag_name')"
          component_ref="$(gh api repos/libsdl-org/SDL_image/releases/latest --jq '.tag_name')"
          test -n "$sdl_ref"
          test -n "$component_ref"
          echo "sdl_ref=$sdl_ref" >> "$GITHUB_OUTPUT"
          echo "component_ref=$component_ref" >> "$GITHUB_OUTPUT"
          echo "Using SDL $sdl_ref and SDL_image $component_ref"

  build:
    name: SDL_image ${{ matrix.rid }}
    needs: resolve
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:

        include:
          - runner: windows-2025
            os: windows
            arch: x64
            rid: win-x64
            msvc_arch: x64
            msvc_host_arch: x64
          - runner: windows-2025
            os: windows
            arch: x86
            rid: win-x86
            msvc_arch: x86
            msvc_host_arch: x64
          - runner: windows-11-arm
            os: windows
            arch: arm64
            rid: win-arm64
            msvc_arch: arm64
            msvc_host_arch: arm64
          - runner: ubuntu-24.04
            os: linux
            arch: x64
            rid: linux-x64
          - runner: ubuntu-24.04
            os: linux
            arch: x86
            rid: linux-x86
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            rid: linux-arm64
          - runner: macos-15-intel
            os: macos
            arch: x64
            rid: osx-x64
            osx_arch: x86_64
          - runner: macos-latest
            os: macos
            arch: arm64
            rid: osx-arm64
            osx_arch: arm64

    env:
      BUILD_DIR: ${{ github.workspace }}/build
      INSTALL_PREFIX: ${{ github.workspace }}/install

    steps:

      - name: Checkout SDL
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL
          ref: ${{ needs.resolve.outputs.sdl_ref }}
          fetch-depth: 1
          submodules: recursive
          path: SDL

      - name: Checkout SDL_image
        uses: actions/checkout@v4
        with:
          repository: libsdl-org/SDL_image
          ref: ${{ needs.resolve.outputs.component_ref }}
          fetch-depth: 1
          submodules: recursive
          path: SDL_image

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ matrix.rid }}" == "linux-x86" ]]; then
            # Build a real 32-bit desktop library on the x64 runner. X11 is
            # enabled; Wayland is disabled because its full 32-bit protocol/
            # decoration dependency chain is not reliably multiarch-packaged.
            sudo dpkg --add-architecture i386
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              build-essential gcc-multilib g++-multilib libc6-dev-i386 \
              cmake ninja-build pkg-config git file \
              libasound2-dev:i386 libusb-1.0-0-dev:i386 \
              libdbus-1-dev:i386 libudev-dev:i386 \
              libx11-dev:i386 libxext-dev:i386 libxrandr-dev:i386 \
              libxcursor-dev:i386 libxfixes-dev:i386 libxi-dev:i386 \
              libxss-dev:i386 libxtst-dev:i386 \
              libgl-dev:i386 libvulkan-dev:i386
          else
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              build-essential cmake ninja-build pkg-config git file \
              libasound2-dev libpulse-dev libjack-dev libsndio-dev \
              libusb-1.0-0-dev libdbus-1-dev libudev-dev \
              libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
              libxi-dev libxss-dev libxtst-dev \
              libwayland-dev wayland-protocols libxkbcommon-dev libdecor-0-dev \
              libdrm-dev libgbm-dev libgl1-mesa-dev libegl1-mesa-dev \
              libpipewire-0.3-dev libvulkan-dev
          fi
      - name: Build and install SDL_image stack (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe was not found." }
          $vs = (& $vswhere -latest -products * -property installationPath).Trim()
          if (-not $vs) { throw "No Visual Studio installation was found." }
          $devcmd = Join-Path $vs 'Common7\Tools\VsDevCmd.bat'
          if (-not (Test-Path $devcmd)) { throw "VsDevCmd.bat was not found at $devcmd" }
          
          $environment = & cmd.exe /d /s /c "`"$devcmd`" -no_logo -arch=${{ matrix.msvc_arch }} -host_arch=${{ matrix.msvc_host_arch }} && set"
          if ($LASTEXITCODE -ne 0) { throw "VsDevCmd failed with exit code $LASTEXITCODE." }
          foreach ($line in $environment) {
            if ($line -match '^([^=]+)=(.*)$') {
              [Environment]::SetEnvironmentVariable($matches[1], $matches[2], 'Process')
            }
          }
          
          Get-Command cl.exe -ErrorAction Stop | Out-Host
          Get-Command cmake.exe -ErrorAction Stop | Out-Host
          Get-Command ninja.exe -ErrorAction Stop | Out-Host
          $common = @(
            '-G', 'Ninja',
            '-DCMAKE_BUILD_TYPE=MinSizeRel',
            '-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON',
            '-DCMAKE_C_FLAGS_MINSIZEREL=/Os /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_CXX_FLAGS_MINSIZEREL=/Os /GL /Gy /Gw /DNDEBUG',
            '-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF',
            '-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=/LTCG /OPT:REF /OPT:ICF'
          )
          $sdlOptions = @(
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            '-DSDL_INSTALL=ON',
            '-DSDL_SHARED=ON',
            '-DSDL_STATIC=OFF',
            '-DSDL_TESTS=OFF',
            '-DSDL_EXAMPLES=OFF',
            '-DSDL_INSTALL_DOCS=OFF',
            '-DSDL_INSTALL_TESTS=OFF'
          )
          & cmake -S SDL -B "$env:BUILD_DIR/SDL" @common @sdlOptions
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --build "$env:BUILD_DIR/SDL" --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --install "$env:BUILD_DIR/SDL"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $componentOptions = @(
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_PREFIX",
            "-DCMAKE_PREFIX_PATH=$env:INSTALL_PREFIX",
            '-DBUILD_SHARED_LIBS=ON',
            '-DSDLIMAGE_INSTALL=ON',
            '-DSDLIMAGE_INSTALL_MAN=OFF',
            '-DSDLIMAGE_INSTALL_CPACK=OFF',
            '-DSDLIMAGE_VENDORED=ON',
            '-DSDLIMAGE_DEPS_SHARED=OFF',
            '-DSDLIMAGE_TESTS=OFF',
            '-DSDLIMAGE_SAMPLES=OFF',
            '-DSDLIMAGE_BACKEND_STB=ON',
            '-DSDLIMAGE_BACKEND_WIC=OFF',
            '-DSDLIMAGE_BACKEND_IMAGEIO=OFF',
            '-DSDLIMAGE_ANI=OFF',
            '-DSDLIMAGE_AVIF=OFF',
            '-DSDLIMAGE_BMP=ON',
            '-DSDLIMAGE_GIF=OFF',
            '-DSDLIMAGE_JPG=ON',
            '-DSDLIMAGE_JXL=OFF',
            '-DSDLIMAGE_LBM=OFF',
            '-DSDLIMAGE_PCX=OFF',
            '-DSDLIMAGE_PNG=ON',
            '-DSDLIMAGE_PNM=OFF',
            '-DSDLIMAGE_QOI=OFF',
            '-DSDLIMAGE_SVG=OFF',
            '-DSDLIMAGE_TGA=OFF',
            '-DSDLIMAGE_TIF=OFF',
            '-DSDLIMAGE_WEBP=OFF',
            '-DSDLIMAGE_XCF=OFF',
            '-DSDLIMAGE_XPM=OFF',
            '-DSDLIMAGE_XV=OFF',
            '-DSDLIMAGE_PNG_LIBPNG=ON',
            '-DSDLIMAGE_BMP_SAVE=ON',
            '-DSDLIMAGE_JPG_SAVE=ON',
            '-DSDLIMAGE_PNG_SAVE=ON',
            '-DSDLIMAGE_JPG_SHARED=OFF',
            '-DSDLIMAGE_PNG_SHARED=OFF'
          )
          & cmake -S SDL_image -B "$env:BUILD_DIR/SDL_image" @common @componentOptions
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --build "$env:BUILD_DIR/SDL_image" --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & cmake --install "$env:BUILD_DIR/SDL_image"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build and install SDL_image stack (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          common=(
            -G Ninja
            -DCMAKE_BUILD_TYPE=MinSizeRel
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
          )
          
          cflags="-Os -flto -ffunction-sections -fdata-sections -DNDEBUG"
          cxxflags="$cflags"
          if [[ "${{ matrix.os }}" == "macos" ]]; then
            ldflags="-flto -Wl,-dead_strip -Wl,-x"
            common+=("-DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}" -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0)
          else
            ldflags="-flto -Wl,--gc-sections -Wl,--as-needed -s"
          fi

          if [[ "${{ matrix.rid }}" == "linux-x86" ]]; then
            # Force every configure/build in this stack to emit i386 code and
            # make pkg-config resolve the 32-bit X11/OpenGL/Vulkan libraries.
            export PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig:/usr/share/pkgconfig
            export PKG_CONFIG_PATH=
            common+=(
              -DCMAKE_SYSTEM_PROCESSOR=x86
              -DCMAKE_C_FLAGS=-m32
              -DCMAKE_CXX_FLAGS=-m32
              -DCMAKE_SHARED_LINKER_FLAGS=-m32
              -DCMAKE_EXE_LINKER_FLAGS=-m32
            )
          fi
          
          common+=(
            "-DCMAKE_C_FLAGS_MINSIZEREL=$cflags"
            "-DCMAKE_CXX_FLAGS_MINSIZEREL=$cxxflags"
            "-DCMAKE_SHARED_LINKER_FLAGS_MINSIZEREL=$ldflags"
            "-DCMAKE_EXE_LINKER_FLAGS_MINSIZEREL=$ldflags"
          )
          sdl_options=(
            "-DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX"
            -DSDL_INSTALL=ON
            -DSDL_SHARED=ON
            -DSDL_STATIC=OFF
            -DSDL_TESTS=OFF
            -DSDL_EXAMPLES=OFF
            -DSDL_INSTALL_DOCS=OFF
            -DSDL_INSTALL_TESTS=OFF
          )

          if [[ "${{ matrix.rid }}" == "linux-x86" ]]; then
            sdl_options+=(
              -DSDL_X11=ON
              -DSDL_WAYLAND=OFF
              -DSDL_KMSDRM=OFF
              -DSDL_LIBDECOR=OFF
              -DSDL_OPENGL=ON
              -DSDL_OPENGLES=OFF
              -DSDL_VULKAN=ON
              -DSDL_ALSA=ON
              -DSDL_PULSEAUDIO=OFF
              -DSDL_JACK=OFF
              -DSDL_SNDIO=OFF
              -DSDL_PIPEWIRE=OFF
            )
          fi
          
          cmake -S SDL -B "$BUILD_DIR/SDL" "${common[@]}" "${sdl_options[@]}"
          cmake --build "$BUILD_DIR/SDL" --parallel
          cmake --install "$BUILD_DIR/SDL" --strip

          component_options=(
            "-DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX"
            "-DCMAKE_PREFIX_PATH=$INSTALL_PREFIX"
            -DBUILD_SHARED_LIBS=ON
            -DSDLIMAGE_INSTALL=ON
            -DSDLIMAGE_INSTALL_MAN=OFF
            -DSDLIMAGE_INSTALL_CPACK=OFF
            -DSDLIMAGE_VENDORED=ON
            -DSDLIMAGE_DEPS_SHARED=OFF
            -DSDLIMAGE_TESTS=OFF
            -DSDLIMAGE_SAMPLES=OFF
            -DSDLIMAGE_BACKEND_STB=ON
            -DSDLIMAGE_BACKEND_WIC=OFF
            -DSDLIMAGE_BACKEND_IMAGEIO=OFF
            -DSDLIMAGE_ANI=OFF
            -DSDLIMAGE_AVIF=OFF
            -DSDLIMAGE_BMP=ON
            -DSDLIMAGE_GIF=OFF
            -DSDLIMAGE_JPG=ON
            -DSDLIMAGE_JXL=OFF
            -DSDLIMAGE_LBM=OFF
            -DSDLIMAGE_PCX=OFF
            -DSDLIMAGE_PNG=ON
            -DSDLIMAGE_PNM=OFF
            -DSDLIMAGE_QOI=OFF
            -DSDLIMAGE_SVG=OFF
            -DSDLIMAGE_TGA=OFF
            -DSDLIMAGE_TIF=OFF
            -DSDLIMAGE_WEBP=OFF
            -DSDLIMAGE_XCF=OFF
            -DSDLIMAGE_XPM=OFF
            -DSDLIMAGE_XV=OFF
            -DSDLIMAGE_PNG_LIBPNG=ON
            -DSDLIMAGE_BMP_SAVE=ON
            -DSDLIMAGE_JPG_SAVE=ON
            -DSDLIMAGE_PNG_SAVE=ON
            -DSDLIMAGE_JPG_SHARED=OFF
            -DSDLIMAGE_PNG_SHARED=OFF
          )
          cmake -S SDL_image -B "$BUILD_DIR/SDL_image" "${common[@]}" "${component_options[@]}"
          cmake --build "$BUILD_DIR/SDL_image" --parallel
          cmake --install "$BUILD_DIR/SDL_image" --strip


          if [[ "${{ matrix.rid }}" == "linux-x86" ]]; then
            mapfile -d '' shared_objects < <(find "$INSTALL_PREFIX" -type f -name '*.so*' -print0)
            (( ${#shared_objects[@]} > 0 ))
            for shared_object in "${shared_objects[@]}"; do
              description="$(file -Lb "$shared_object")"
              echo "$shared_object: $description"
              [[ "$description" == *"ELF 32-bit"* ]]
            done
          fi


      - name: Upload SDL_image ${{ matrix.rid }}
        uses: actions/upload-artifact@v4
        with:
          name: SDL_image-${{ matrix.rid }}
          path: ${{ env.INSTALL_PREFIX }}/
          if-no-files-found: error
          compression-level: 9
